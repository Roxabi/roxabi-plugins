# sample-stack.yml — fixture for parse-stack-yml unit tests
# Exercises all 5 logical fields: formatters, deploy.platform, frontend.framework,
# package_manager, and standards.
schema_version: "1.0"

runtime: bun
package_manager: bun

backend:
  framework: nestjs
  path: apps/api

frontend:
  framework: tanstack-start
  path: apps/web

shared:
  types: packages/types

build:
  orchestrator: turbo
  formatter: biome
  formatter_config: biome.json
  formatter_fix_cmd: "bunx biome check --write"
  formatters:
    - cmd: "bunx biome check --write"
      ext: [".ts", ".tsx", ".js", ".jsx", ".json"]
    - cmd: "ruff format"
      ext: [".py"]

testing:
  unit: vitest
  e2e: playwright

deploy:
  platform: vercel
  secrets_cmd: "vercel env add"

docs:
  framework: none
  path: docs
  format: md

commands:
  dev: bun run dev
  build: bun run build
  test: bun run test
  lint: bun run lint
  typecheck: bun run typecheck
  format: "bunx biome check --write"
  install: bun install

artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

standards:
  architecture: docs/architecture
  deployment: docs/guides/deployment.md
  configuration: docs/configuration.md
  troubleshooting: docs/guides/troubleshooting.md
