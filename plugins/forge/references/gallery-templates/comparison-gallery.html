<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: diagram-meta — update title, date, color, badges
     ═══════════════════════════════════════════════════════════════ -->
<title>{{TITLE}}</title>
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="{{TITLE}}">
<meta name="diagram:date"      content="{{DATE}}">
<meta name="diagram:category"  content="{{CATEGORY}}">
<meta name="diagram:cat-label" content="{{CAT_LABEL}}">
<meta name="diagram:color"     content="{{COLOR}}">
<meta name="diagram:badges"    content="latest">
<!-- diagram-meta:end -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{GALLERY_BASE_CSS}}">
<style>
/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: override accent tokens for your project brand
   ══════════════════════════════════════════════════════════════════ */
:root {
  --accent:{{ACCENT_COLOR}};   /* e.g. #e8a030 */
  --accent-dim:{{ACCENT_DIM}}; /* e.g. rgba(232,160,48,0.12) */
}

/* ── Layout ── */
.layout{max-width:1400px;margin:0 auto;padding:24px 24px 64px}

/* ── Header overrides ── */
.header{padding-bottom:20px;margin-bottom:18px}
.header-left h1{font-size:1.4rem;letter-spacing:-0.02em}
.header-left .sub{font-size:.78rem;margin-top:4px;line-height:1.5}

/* ── Toolbar overrides ── */
.toolbar{padding:8px 0}
.toolbar:last-of-type{margin-bottom:16px}
.seg{padding:4px 9px}
.size-label{min-width:28px}
.search-input{width:160px}

/* ── Section headers ── */
.section-hdr{margin:28px 0 14px;padding-top:20px;border-top:1px solid var(--border)}
.section-hdr h2{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:4px}
.section-hdr .section-sub{font-size:.75rem;color:var(--text-dim);line-height:1.5}
.section-hdr:first-child{margin-top:0;padding-top:0;border-top:none}

/* ── Card grid ── */
.card-grid{display:grid;gap:16px}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.comp-card:hover{border-color:var(--border2)}
.comp-card.hidden{display:none}

/* Card image */
.comp-card .card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:zoom-in;background:var(--surface)}

/* Card body */
.comp-card .card-body{padding:14px 16px}
.comp-card .card-title{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4}

/* Badges */
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.04em;border:1px solid}
/* CUSTOMISE: add badge variants matching your data — or reuse these built-ins */
.bdg-clean  {background:var(--green-dim); color:var(--green); border-color:var(--green)}
.bdg-bad    {background:var(--red-dim);   color:var(--red);   border-color:var(--red)}
.bdg-mid    {background:var(--amber-dim); color:var(--amber); border-color:var(--amber)}
.bdg-ref    {background:var(--blue-dim);  color:var(--blue);  border-color:var(--blue)}
.bdg-a      {background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.bdg-b      {background:var(--purple-dim);color:var(--purple);border-color:var(--purple)}
.bdg-c      {background:var(--orange-dim);color:var(--orange);border-color:var(--orange)}

/* Specs table */
.specs-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.76rem}
.specs-table td{padding:3px 0;vertical-align:top}
.specs-table td:first-child{color:var(--text-xdim);width:110px;white-space:nowrap;padding-right:10px}
.specs-table td:last-child{color:var(--text-dim)}
.specs-table td code{font-family:var(--mono);font-size:.7rem;background:var(--surface);padding:1px 4px;border-radius:3px}

/* Verdict */
.verdict{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:.78rem;line-height:1.5}
.verdict-clean{background:var(--green-dim);border:1px solid rgba(52,211,153,.25);color:#6ee7b7}
.verdict-bad  {background:var(--red-dim);  border:1px solid rgba(248,113,113,.25);color:#fca5a5}
.verdict-mid  {background:var(--amber-dim);border:1px solid rgba(232,160,48,.25); color:#fcd34d}
/* CUSTOMISE: add more verdict types if needed */

/* ── Lightbox ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;justify-content:center;align-items:center;cursor:zoom-out}
.lb.active{display:flex}
.lb img{max-width:90vw;max-height:90vh;object-fit:contain}
.lb-label{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:var(--text-dim);font-family:var(--mono);font-size:.7rem;white-space:nowrap}
.lb-close{position:absolute;top:16px;right:20px;font-size:20px;color:var(--text-xdim);cursor:pointer;transition:color .15s}
.lb-close:hover{color:var(--text)}

</style>
</head>
<body>
<div class="layout">

<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: header — update title, subtitle
     ═══════════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-left">
    <h1>{{TITLE_PLAIN}} <span>{{TITLE_ACCENT}}</span></h1>
    <div class="sub">{{SUBTITLE}}</div>
  </div>
  <button class="theme-btn" id="themeBtn" title="Toggle theme">&#127769;</button>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 1: sort + size
     CUSTOMISE: sort options should match meaningful card fields
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar">
  <div class="ctrl"><span class="ctrl-label">Sort</span>
    <div class="segs" id="sortSegs">
      <button class="seg on" data-v="default">Default</button>
      <button class="seg" data-v="title">Title A–Z</button>
      <!-- CUSTOMISE: add sort modes matching card fields, e.g. data-v="verdict" -->
    </div>
  </div>
  <div class="ctrl"><span class="ctrl-label">Size</span>
    <button class="size-btn" onclick="resizeCards(-40)">&#8722;</button>
    <span class="size-label" id="sizeLabel">380</span>
    <button class="size-btn" onclick="resizeCards(+40)">+</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 2: dynamic filters + search
     Filters auto-built from FILTERS_DIMS — no hardcoded buttons
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar" id="filterBar">
  <div class="ctrl"><span class="ctrl-label">Search</span>
    <input class="filter-input search-input" id="searchInput" type="text" placeholder="filter..." oninput="render()">
  </div>
</div>

<!-- Sections + cards rendered here -->
<div id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLbOutside(event)">
  <span class="lb-close" onclick="closeLb()">&#10005;</span>
  <img id="lbImg" src="" alt="">
  <div class="lb-label" id="lbLabel"></div>
</div>

<script src="{{GALLERY_BASE_JS}}"></script>
<script>
/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: SECTIONS + CARDS config

   SECTIONS define group headings. Each section has:
     { id, title, subtitle }

   CARDS define individual comparison items. Each card has:
     {
       section:  'section-id',        // which section this card belongs to
       image:    'path/to/image.png', // relative to HTML file
       title:    'Card title',
       badges:   [                    // array of badge objects
         { text: 'CLEAN', type: 'clean' },  // type maps to .bdg-{type} CSS class
       ],
       specs:    {                    // key-value pairs for the specs table
         'Engine': 'Klein 4B',
         'Steps':  '28',
       },
       verdict:  {                    // optional verdict box
         text: 'Clean output. No banding.',
         type: 'clean',              // 'clean', 'bad', 'mid' — maps to .verdict-{type}
       },
       tags:     ['tag1','tag2'],    // used for dynamic filters (badge types work too)
     }

   Example SECTIONS:
   const SECTIONS = [
     { id:'baseline', title:'Baseline Tests', subtitle:'No modification — isolating the baseline.' },
     { id:'tuning',   title:'Tuning Tests',   subtitle:'Same model, varying one parameter at a time.' },
   ];

   Example CARDS:
   const CARDS = [
     {
       section: 'baseline',
       image:   'images/001-baseline.png',
       title:   'Baseline — Default Settings',
       badges:  [{ text:'REF', type:'ref' }, { text:'CLEAN', type:'clean' }],
       specs:   { 'Model': 'Klein 4B', 'Steps': '28', 'VRAM': '8.5 GB' },
       verdict: { text:'Reference output. No artifacts visible.', type:'clean' },
       tags:    ['baseline','clean'],
     },
     {
       section: 'tuning',
       image:   'images/002-tuning-a.png',
       title:   'Tuning — Strength 0.8',
       badges:  [{ text:'CHECK', type:'mid' }],
       specs:   { 'Strength': '0.8', 'Steps': '4' },
       verdict: { text:'Reduced artifacts. Identity partially preserved.', type:'mid' },
       tags:    ['tuning','mid'],
     },
   ];
   ══════════════════════════════════════════════════════════════════ */

/* ── SECTIONS ───────────────────────────────────────────────────── */
const SECTIONS = [
  /* {{SECTIONS_CONFIG}} */
];

/* ── CARDS ──────────────────────────────────────────────────────── */
const CARDS = [
  /* {{CARDS_CONFIG}} */
];

/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: FILTERS_DIMS — which card properties generate filter buttons.
   fn(card) must return a string category used as a filter bucket.
   Rule: all buttons OFF = inactive = show all cards.

   Example:
   const FILTERS_DIMS = {
     verdict: {
       label: 'Verdict',
       fn: card => card.verdict?.type || 'none',
       order: ['clean','mid','bad'],
     },
     section: {
       label: 'Section',
       fn: card => card.section,
     },
   };
   ══════════════════════════════════════════════════════════════════ */
const FILTERS_DIMS = {
  /* {{FILTERS_DIMS_CONFIG}} */
};

/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: localStorage key prefix — change per project
   ══════════════════════════════════════════════════════════════════ */
const STORE_KEY = '{{STORE_KEY_PREFIX}}';  /* e.g. 'lyra-comparison' */

/* ══════════════════════════════════════════════════════════════════
   ENGINE — do not edit below unless extending functionality
   ══════════════════════════════════════════════════════════════════ */

const filters = {};  /* dim key → Set; empty = inactive = show all */
let sortMode = 'default';
let cardMinWidth = 380;

/* ── Dynamic filter builder (delegated to gallery-base.js) ── */

/* ── Filtering ── */

function getFiltered() {
  let cards = applyDimFilters([...CARDS], FILTERS_DIMS, filters);

  /* Search */
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  if (q) cards = cards.filter(c => {
    const hay = [
      c.title,
      ...(c.badges || []).map(b => b.text),
      ...Object.entries(c.specs || {}).map(([k, v]) => k + ' ' + v),
      c.verdict?.text || '',
      ...(c.tags || []),
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });

  return cards;
}

/* ── Sorting ── */

function sortCards(cards) {
  if (sortMode === 'title') return [...cards].sort((a, b) => a.title.localeCompare(b.title));
  /* CUSTOMISE: add more sort modes here */
  return cards;  /* default: CARDS array order */
}

/* ── Size ── */

function resizeCards(d) {
  cardMinWidth = Math.max(200, Math.min(800, cardMinWidth + d));
  document.getElementById('sizeLabel').textContent = cardMinWidth;
  /* Re-apply grid column width */
  document.querySelectorAll('.card-grid').forEach(g => {
    g.style.gridTemplateColumns = 'repeat(auto-fill,minmax(' + cardMinWidth + 'px,1fr))';
  });
}

/* ── Card renderer ── */

function mkCard(card) {
  const badges = (card.badges || []).map(b =>
    `<span class="bdg bdg-${safeClass(b.type)}">${escHtml(b.text)}</span>`
  ).join('');

  const specs = Object.entries(card.specs || {}).map(([k, v]) =>
    `<tr><td>${escHtml(k)}</td><td>${escHtml(v)}</td></tr>`
  ).join('');

  const verdict = card.verdict
    ? `<div class="verdict verdict-${safeClass(card.verdict.type)}">${escHtml(card.verdict.text)}</div>`
    : '';

  return `<div class="comp-card" data-card-id="${card._idx}">
    <img class="card-img" src="${escHtml(card.image)}" data-label="${escHtml(card.title)}" loading="lazy" alt="${escHtml(card.title)}">
    <div class="card-body">
      <div class="card-title">${escHtml(card.title)}</div>
      ${badges ? '<div class="badges">' + badges + '</div>' : ''}
      ${specs ? '<table class="specs-table">' + specs + '</table>' : ''}
      ${verdict}
    </div>
  </div>`;
}

/* ── Render ── */

function render() {
  const el = document.getElementById('gallery');
  const filtered = sortCards(getFiltered());
  const total = CARDS.length;

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">No cards match the current filters.</div>';
    document.getElementById('stats').textContent = '0 / ' + total;
    return;
  }

  /* Index visible cards for reference */
  filtered.forEach((c, i) => c._idx = i);

  if (!SECTIONS.length) {
    /* No sections — flat grid */
    el.innerHTML = `<div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cardMinWidth}px,1fr))">` +
      filtered.map(mkCard).join('') + '</div>';
  } else {
    /* Group by section */
    let html = '';
    for (const sec of SECTIONS) {
      const secCards = filtered.filter(c => c.section === sec.id);
      if (!secCards.length) continue;
      html += `<div class="section-hdr">
        <h2>${escHtml(sec.title)}</h2>
        ${sec.subtitle ? '<div class="section-sub">' + escHtml(sec.subtitle) + '</div>' : ''}
      </div>
      <div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cardMinWidth}px,1fr))">
        ${secCards.map(mkCard).join('')}
      </div>`;
    }
    /* Cards with no matching section */
    const orphans = filtered.filter(c => !SECTIONS.find(s => s.id === c.section));
    if (orphans.length) {
      html += `<div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cardMinWidth}px,1fr))">` +
        orphans.map(mkCard).join('') + '</div>';
    }
    el.innerHTML = html;
  }

  document.getElementById('stats').textContent = filtered.length + ' / ' + total;
}

/* ── Lightbox ── */

function openLb(src, label) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lbLabel').textContent = label || '';
  document.getElementById('lb').classList.add('active');
}

function closeLb() { document.getElementById('lb').classList.remove('active'); }

function closeLbOutside(e) {
  if (e.target === document.getElementById('lb')) closeLb();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLb();
});

// Delegated click handler for card images (avoids inline onclick with user data)
document.getElementById('gallery').addEventListener('click', e => {
  const img = e.target.closest('[data-label]');
  if (img) openLb(img.src, img.dataset.label);
});

/* ── Sort wiring (delegated to gallery-base.js) ── */

wireSegs('sortSegs', v => { sortMode = v; render(); });

/* ── Theme (delegated to gallery-base.js) ── */

/* ── Boot ── */

const S = initTheme(STORE_KEY);

if (!CARDS.length) {
  document.getElementById('gallery').innerHTML = '<div class="empty">No CARDS configured — fill in the CARDS array.</div>';
  document.getElementById('stats').textContent = '0 / 0';
} else {
  buildDimFilters(CARDS, FILTERS_DIMS, filters, 'filterBar', render);
  render();
}
</script>
</body>
</html>
