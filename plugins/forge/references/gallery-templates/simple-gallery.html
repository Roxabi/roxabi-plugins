<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: diagram-meta — update title, date, color, badges
     ═══════════════════════════════════════════════════════════════ -->
<title>{{TITLE}}</title>
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="{{TITLE}}">
<meta name="diagram:date"      content="{{DATE}}">
<meta name="diagram:category"  content="{{CATEGORY}}">
<meta name="diagram:cat-label" content="{{CAT_LABEL}}">
<meta name="diagram:color"     content="{{COLOR}}">
<meta name="diagram:badges"    content="latest">
<!-- diagram-meta:end -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- CUSTOMISE: adjust path to gallery-base.css for your deploy location -->
<link rel="stylesheet" href="gallery-base.css">
<style>
/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: override accent tokens for your project brand
   ══════════════════════════════════════════════════════════════════ */
:root {
  --accent:{{ACCENT_COLOR}};   /* e.g. #e8a030 (amber), #c084fc (purple), #60a5fa (blue) */
  --accent-dim:{{ACCENT_DIM}}; /* e.g. rgba(232,160,48,0.12) */
}

/* ── Layout ── */
.layout{max-width:100%;margin:0 auto;padding:20px 20px 64px}

/* ── Batch bar ── */
.batch-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.batch-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;font-family:var(--mono);font-size:.65rem;font-weight:500;padding:5px 12px;transition:all .15s;white-space:nowrap}
.batch-btn:hover{border-color:var(--border2);color:var(--text)}
.batch-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Image grid ── */
.grid{display:grid;gap:6px}
.img-card{position:relative;border-radius:5px;overflow:hidden;border:1px solid var(--border);transition:border-color .15s,transform .12s}
.img-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.img-card.hidden{display:none}
.img-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:zoom-in;background:var(--surface)}
.img-card .badge-top{position:absolute;top:5px;left:5px;font-family:var(--mono);font-size:.5rem;font-weight:600;padding:2px 5px;border-radius:3px;background:rgba(0,0,0,.7);color:var(--accent);border:1px solid var(--accent-dim);letter-spacing:.04em}
.img-card .badge-batch{position:absolute;top:5px;right:5px;font-family:var(--mono);font-size:.5rem;padding:1px 4px;border-radius:2px;background:rgba(0,0,0,.7);color:var(--text-dim)}
.img-card.starred{border-color:var(--orange)}
.img-card.starred::after{content:'★';position:absolute;bottom:5px;right:5px;color:var(--orange);font-size:13px;text-shadow:0 0 6px rgba(251,146,60,.5)}
.img-card .info{padding:6px 8px 8px}
.img-card .info .num{font-size:.55rem;color:var(--accent);font-family:var(--mono);margin-bottom:2px}
.img-card .info .lbl{font-size:.68rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.img-card .info .tags{display:flex;gap:3px;flex-wrap:wrap}
.img-tag{font-size:.52rem;font-family:var(--mono);padding:1px 4px;border-radius:2px;background:var(--surface2);color:var(--text-xdim);border:1px solid var(--border)}
.star-btn{position:absolute;bottom:6px;right:6px;background:transparent;border:none;cursor:pointer;font-size:15px;color:var(--text-xdim);transition:color .15s;line-height:1;padding:2px;z-index:2}
.star-btn:hover{color:var(--orange)}
.img-card.starred .star-btn{color:var(--orange)}

/* ── Lightbox ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;flex-direction:column;justify-content:center;align-items:center}
.lb.open{display:flex}
.lb-img{max-width:70vmin;max-height:70vmin;border-radius:10px;object-fit:contain;display:block}
.lb-meta{margin-top:16px;text-align:center;max-width:480px}
.lb-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:6px}
.lb-tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.lb-caption{font-family:var(--mono);font-size:.65rem;color:var(--text-xdim)}
.lb-btn{position:absolute;top:50%;transform:translateY(-50%);font-size:36px;color:var(--text-xdim);cursor:pointer;padding:16px 20px;user-select:none;transition:color .15s}
.lb-btn:hover{color:var(--accent)}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-close{position:absolute;top:16px;right:20px;font-size:18px;color:var(--text-xdim);cursor:pointer;transition:color .15s}
.lb-close:hover{color:var(--text)}

</style>
</head>
<body>
<div class="layout">

<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: header — update title, subtitle, theme button
     ═══════════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-left">
    <h1>{{TITLE_PLAIN}} <span>{{TITLE_ACCENT}}</span></h1>
    <div class="sub" id="subtitle">{{SUBTITLE}}</div>
  </div>
  <button class="theme-btn" id="themeBtn" title="Toggle theme">&#127769;</button>
</div>

<!-- Batch tab bar — auto-generated from BATCHES, do not hardcode -->
<div class="batch-bar" id="batchBar"></div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 1: sort + size
     CUSTOMISE: adjust sort options to match your data
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar">
  <div class="ctrl"><span class="ctrl-label">Sort</span>
    <div class="segs" id="sortSegs">
      <button class="seg on" data-v="default">Default</button>
      <button class="seg" data-v="name">Name</button>
      <!-- CUSTOMISE: add more sort options matching your data keys -->
    </div>
  </div>
  <div class="ctrl"><span class="ctrl-label">Size</span>
    <button class="size-btn" onclick="resizeThumb(-20)">&#8722;</button>
    <span class="size-label" id="sizeLabel">160</span>
    <button class="size-btn" onclick="resizeThumb(+20)">+</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 2: dynamic filters + search
     Filters are auto-built from DIMS — do not hardcode buttons here
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar" id="filterBar">
  <div class="ctrl"><span class="ctrl-label">Search</span>
    <input class="filter-input search-input" id="searchInput" type="text" placeholder="filter..." oninput="render()">
  </div>
</div>

<div id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLbOutside(event)">
  <span class="lb-close" onclick="closeLb()">&#10005;</span>
  <span class="lb-btn lb-prev" onclick="lbNav(-1,event)">&#8249;</span>
  <img class="lb-img" id="lbImg" src="" alt="">
  <div class="lb-meta">
    <div class="lb-title"  id="lbTitle"></div>
    <div class="lb-tags"   id="lbTags"></div>
    <div class="lb-caption" id="lbCaption"></div>
  </div>
  <span class="lb-btn lb-next" onclick="lbNav(1,event)">&#8250;</span>
</div>

<!-- CUSTOMISE: adjust path to gallery-base.js for your deploy location -->
<script src="gallery-base.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: BATCHES config
   Each batch: image dir (relative to HTML) + optional static catalogue.
   Discovery falls back to manifest.json → /api/list/ → catalogue keys.

   Example:
   const BATCHES = [
     { id:'v1', label:'First Pass',  dir:'images/v1/', ext:'.png', catalogue: CATALOGUE_V1 },
     { id:'v2', label:'Second Pass', dir:'images/v2/', ext:'.png', catalogue: CATALOGUE_V2 },
   ];
   ══════════════════════════════════════════════════════════════════ */

/* CUSTOMISE: static catalogue (optional)
   Maps filename stem → { label, tags: [] }
   Remove entries for batches where filenames are self-descriptive.

   Example:
   const CATALOGUE_V1 = {
     '001-calm-frontal': { label:'Calm · Frontal', tags:['calm','frontal','studio'] },
     '002-smile-3q':     { label:'Smile · 3Q',     tags:['smile','3q','studio'] },
   };
*/
const CATALOGUE_V1 = {
  /* {{CATALOGUE_V1_ENTRIES}} */
};

const BATCHES = [
  /* {{BATCHES_CONFIG}}
     Example:
     { id:'v1', label:'{{BATCH_1_LABEL}}', dir:'{{BATCH_1_DIR}}', ext:'.png', catalogue: CATALOGUE_V1 },
  */
];

/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: DIMS — tag-based filter dimensions
   Each key = one filter group in the toolbar.
   fn(tags) must return a string category from the item's tags array.
   order: preferred display order for buttons (optional).

   Rule: all buttons OFF = filter inactive = show everything.

   Example:
   const DIMS = {
     lighting: {
       label: 'Lighting',
       fn: tags => tags.find(t => ['studio','evening','minimal'].includes(t)) || 'other',
       order: ['studio','evening','minimal'],
     },
     expression: {
       label: 'Expression',
       fn: tags => tags.find(t => ['calm','smile','focused','direct'].includes(t)) || 'other',
       order: ['calm','smile','focused','direct'],
     },
   };
   ══════════════════════════════════════════════════════════════════ */
const DIMS = {
  /* {{DIMS_CONFIG}} */
};

/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: localStorage key prefix — change per project
   ══════════════════════════════════════════════════════════════════ */
const STORE_KEY = '{{STORE_KEY_PREFIX}}';  /* e.g. 'lyra-avatar' */

/* ══════════════════════════════════════════════════════════════════
   ENGINE — uses gallery-base.js utilities
   ══════════════════════════════════════════════════════════════════ */

const starred = initStarred(STORE_KEY);
const filters = {};

/* LEGACY WORKAROUND — items-as-objects is now the preferred pattern.
   This wrapper exists because this template's DIMS.fn signature takes
   `item.tags` (a subfield), while buildDimFilters passes the full item.
   New galleries should define DIMS.fn to read directly from the item object
   (e.g. `fn: it => it.tags[0]`) and skip this wrapper. See README section
   "Items-as-objects vs filename-strings" for guidance. */
const DIMS_WRAPPED = {};
for (const [k, dim] of Object.entries(DIMS)) {
  DIMS_WRAPPED[k] = { ...dim, fn: item => dim.fn(item.tags) };
}

let allItems = [];
let visibleItems = [];
let lbIndex = 0;
let sortMode = 'default';
window.thumbSize = 160;
let currentBatch = 'all';

/* ── Filtering ── */

function getFiltered() {
  let items = allItems.filter(item => currentBatch === 'all' || item.batch === currentBatch);
  items = applyDimFilters(items, DIMS_WRAPPED, filters);

  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  if (q) items = items.filter(item =>
    item.label.toLowerCase().includes(q) ||
    item.stem.toLowerCase().includes(q) ||
    item.tags.join(' ').toLowerCase().includes(q)
  );

  return items;
}

/* ── Sorting ── */

function sortItems(items) {
  if (sortMode === 'name') return [...items].sort((a, b) => a.label.localeCompare(b.label));
  return items;
}

/* ── Rendering ── */

function render() {
  const el = document.getElementById('gallery');
  const filtered = sortItems(getFiltered());
  visibleItems = filtered;
  const total = allItems.length;

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">No images match the current filters.</div>';
    document.getElementById('stats').textContent = '0 / ' + total;
    return;
  }

  const cols = Math.max(2, Math.floor((window.innerWidth - 48) / (thumbSize + 8)));
  el.innerHTML = '<div class="grid" style="grid-template-columns:repeat(' + cols + ',1fr)">' +
    filtered.map((item, i) => mkCard(item, i)).join('') +
  '</div>';

  document.getElementById('stats').textContent = filtered.length + ' / ' + total;

  /* Wire star buttons */
  el.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const card = btn.closest('.img-card');
      const stem = card.dataset.stem;
      const isNowStarred = starred.toggle(stem);
      card.classList.toggle('starred', isNowStarred);
      btn.textContent = isNowStarred ? '\u2605' : '\u2606';
    });
  });

  /* Wire image clicks for lightbox */
  el.querySelectorAll('.img-card img').forEach(img => {
    img.addEventListener('click', () => {
      const card = img.closest('.img-card');
      const idx = parseInt(card.dataset.idx, 10);
      openLb(idx);
    });
  });
}

function mkCard(item, idx) {
  const isStarred = starred.has(item.stem);
  const num = item.stem.split('-')[0] || '';
  return `<div class="img-card${isStarred ? ' starred' : ''}" data-stem="${escHtml(item.stem)}" data-idx="${idx}">
    <span class="badge-top">${escHtml(item.tags[0] ? item.tags[0].toUpperCase() : item.batch.toUpperCase())}</span>
    ${item.batch !== BATCHES[0]?.id ? `<span class="badge-batch">${escHtml(item.batch.toUpperCase())}</span>` : ''}
    <img src="${escHtml(item.dir + item.file)}" alt="${escHtml(item.label)}" loading="lazy" style="height:${thumbSize}px;min-height:${thumbSize}px">
    <div class="info">
      <div class="num">${escHtml(num)}</div>
      <div class="lbl">${escHtml(item.label)}</div>
      <div class="tags">${item.tags.map(t => `<span class="img-tag">${escHtml(t)}</span>`).join('')}</div>
    </div>
    <button class="star-btn" title="Star">${isStarred ? '\u2605' : '\u2606'}</button>
  </div>`;
}

/* ── Batch bar — delegates to gallery-base.js ── */

/* ── Lightbox ── */

function openLb(idx) {
  lbIndex = idx;
  renderLb();
  document.getElementById('lb').classList.add('open');
}

function renderLb() {
  const item = visibleItems[lbIndex];
  if (!item) return;
  document.getElementById('lbImg').src = item.dir + item.file;
  document.getElementById('lbImg').alt = item.label;
  document.getElementById('lbTitle').textContent = item.stem.split('-')[0] + ' — ' + item.label;
  const tagsEl = document.getElementById('lbTags');
  tagsEl.innerHTML = '';
  item.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'img-tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });
  document.getElementById('lbCaption').textContent = item.file;
}

function lbNav(dir, e) {
  if (e) e.stopPropagation();
  if (!visibleItems.length) return;
  lbIndex = (lbIndex + dir + visibleItems.length) % visibleItems.length;
  renderLb();
}

function closeLb() { document.getElementById('lb').classList.remove('open'); }

function closeLbOutside(e) {
  if (e.target === document.getElementById('lb')) closeLb();
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  else if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'Escape') closeLb();
});

/* ── Sort + theme wiring — delegates to gallery-base.js ── */

wireSegs('sortSegs', v => { sortMode = v; render(); });
const S = initTheme(STORE_KEY);

/* ── Boot ── */

(async () => {
  if (!BATCHES.length) {
    document.getElementById('gallery').innerHTML = '<div class="empty">No BATCHES configured — fill in the BATCHES array.</div>';
    document.getElementById('stats').textContent = '0 / 0';
    return;
  }

  const results = await Promise.all(BATCHES.map(b => discoverBatch(b)));
  allItems = results.flat();

  if (!allItems.length) {
    document.getElementById('gallery').innerHTML = '<div class="empty">No images found. Check BATCHES dirs and manifest.json.</div>';
    document.getElementById('stats').textContent = '0 / 0';
    return;
  }

  const counts = {};
  allItems.forEach(item => { counts[item.batch] = (counts[item.batch] || 0) + 1; });

  buildBatchBar({ barId:'batchBar', batches:BATCHES, counts, total:allItems.length,
    onSelect: id => { currentBatch = id; render(); } });
  buildDimFilters(allItems, DIMS_WRAPPED, filters, 'filterBar', render);
  render();

  document.getElementById('subtitle').textContent = allItems.length + ' images \u00b7 ' +
    BATCHES.filter(b => counts[b.id] > 0).map(b => b.id.toUpperCase() + ': ' + counts[b.id]).join(' \u00b7 ');
})();
</script>
</body>
</html>
