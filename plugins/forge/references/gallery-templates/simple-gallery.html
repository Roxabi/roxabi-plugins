<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: diagram-meta — update title, date, color, badges
     ═══════════════════════════════════════════════════════════════ -->
<title>{{TITLE}}</title>
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="{{TITLE}}">
<meta name="diagram:date"      content="{{DATE}}">
<meta name="diagram:category"  content="{{CATEGORY}}">
<meta name="diagram:cat-label" content="{{CAT_LABEL}}">
<meta name="diagram:color"     content="{{COLOR}}">
<meta name="diagram:badges"    content="latest">
<!-- diagram-meta:end -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   TOKENS — replace --accent and --accent-dim with project brand color
   ══════════════════════════════════════════════════════════════════ */
:root {
  --bg:#0c0e16; --surface:#13161f; --surface2:#1a1d2a; --card:#1e2133;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#dde4f0; --text-dim:#7d8799; --text-xdim:#3e4556;
  /* CUSTOMISE: swap this accent color for your project brand */
  --accent:{{ACCENT_COLOR}};        /* e.g. #e8a030 (amber), #c084fc (purple), #60a5fa (blue) */
  --accent-dim:{{ACCENT_DIM}};      /* e.g. rgba(232,160,48,0.12) */
  --green:#34d399; --blue:#60a5fa; --purple:#a78bfa; --orange:#fb923c;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
[data-theme="light"] {
  --bg:#f5f2ec; --surface:#ede9e0; --surface2:#e5e0d5; --card:#faf8f4;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1d2b; --text-dim:#5a6070; --text-xdim:#9aa0ae;
}

/* ══════════════════════════════════════════════════════════════════
   BASE — do not edit
   ══════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.layout{max-width:100%;margin:0 auto;padding:20px 20px 64px}

/* ── Header ── */
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.header-left h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.01em}
.header-left h1 span{color:var(--accent)}
.header-left .sub{font-size:.72rem;color:var(--text-dim);margin-top:3px;line-height:1.4}
.theme-btn{background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);cursor:pointer;font-size:.85rem;padding:5px 10px;flex-shrink:0}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Batch bar ── */
.batch-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.batch-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer;font-family:var(--mono);font-size:.65rem;font-weight:500;padding:5px 12px;transition:all .15s;white-space:nowrap}
.batch-btn:hover{border-color:var(--border2);color:var(--text)}
.batch-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Toolbar ── */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.toolbar:last-of-type{margin-bottom:12px}
.ctrl{display:flex;align-items:center;gap:4px}
.ctrl-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-xdim);font-family:var(--mono)}

/* Segmented controls */
.segs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.seg{background:none;border:none;border-right:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-family:var(--font);font-size:.65rem;font-weight:500;padding:4px 8px;transition:background .1s,color .1s;white-space:nowrap}
.seg:last-child{border-right:none}
.seg:hover{background:var(--surface2);color:var(--text)}
.seg.on{background:var(--accent-dim);color:var(--accent);font-weight:600}

/* Checkbox toggle buttons (OFF = inactive = show all) */
.check-group{display:flex;gap:3px;flex-wrap:wrap}
.check-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:.6rem;padding:3px 6px;font-family:var(--mono);transition:all .1s}
.check-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.check-btn:hover{border-color:var(--accent)}

/* Size +/- */
.size-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:.85rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-family:var(--mono)}
.size-btn:hover{border-color:var(--accent);color:var(--accent)}
.size-label{font-size:.6rem;color:var(--text-xdim);font-family:var(--mono);min-width:24px;text-align:center}

/* Inputs */
.filter-input{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.65rem;padding:4px 8px;outline:none}
.filter-input:focus{border-color:var(--accent)}
.search-input{width:140px}

/* Stats */
.stats{font-family:var(--mono);font-size:.6rem;color:var(--text-xdim);margin-left:auto}

/* ── Image grid ── */
.grid{display:grid;gap:6px}
.img-card{position:relative;border-radius:5px;overflow:hidden;border:1px solid var(--border);transition:border-color .15s,transform .12s}
.img-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.img-card.hidden{display:none}
.img-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:zoom-in;background:var(--surface)}
.img-card .badge-top{position:absolute;top:5px;left:5px;font-family:var(--mono);font-size:.5rem;font-weight:600;padding:2px 5px;border-radius:3px;background:rgba(0,0,0,.7);color:var(--accent);border:1px solid var(--accent-dim);letter-spacing:.04em}
.img-card .badge-batch{position:absolute;top:5px;right:5px;font-family:var(--mono);font-size:.5rem;padding:1px 4px;border-radius:2px;background:rgba(0,0,0,.7);color:var(--text-dim)}
.img-card.starred{border-color:var(--orange)}
.img-card.starred::after{content:'★';position:absolute;bottom:5px;right:5px;color:var(--orange);font-size:13px;text-shadow:0 0 6px rgba(251,146,60,.5)}
.img-card .info{padding:6px 8px 8px}
.img-card .info .num{font-size:.55rem;color:var(--accent);font-family:var(--mono);margin-bottom:2px}
.img-card .info .lbl{font-size:.68rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.img-card .info .tags{display:flex;gap:3px;flex-wrap:wrap}
.img-tag{font-size:.52rem;font-family:var(--mono);padding:1px 4px;border-radius:2px;background:var(--surface2);color:var(--text-xdim);border:1px solid var(--border)}
.star-btn{position:absolute;bottom:6px;right:6px;background:transparent;border:none;cursor:pointer;font-size:15px;color:var(--text-xdim);transition:color .15s;line-height:1;padding:2px;z-index:2}
.star-btn:hover{color:var(--orange)}
.img-card.starred .star-btn{color:var(--orange)}

/* ── Group headers ── */
.group-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding:4px 0;border-top:1px solid var(--border)}
.group-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:4px;font-family:var(--mono);background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.group-cnt{font-family:var(--mono);font-size:.58rem;color:var(--text-xdim)}

/* ── Lightbox ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;flex-direction:column;justify-content:center;align-items:center}
.lb.open{display:flex}
.lb-img{max-width:70vmin;max-height:70vmin;border-radius:10px;object-fit:contain;display:block}
.lb-meta{margin-top:16px;text-align:center;max-width:480px}
.lb-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:6px}
.lb-tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.lb-caption{font-family:var(--mono);font-size:.65rem;color:var(--text-xdim)}
.lb-btn{position:absolute;top:50%;transform:translateY(-50%);font-size:36px;color:var(--text-xdim);cursor:pointer;padding:16px 20px;user-select:none;transition:color .15s}
.lb-btn:hover{color:var(--accent)}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-close{position:absolute;top:16px;right:20px;font-size:18px;color:var(--text-xdim);cursor:pointer;transition:color .15s}
.lb-close:hover{color:var(--text)}

/* ── Empty state ── */
.empty{text-align:center;padding:64px 24px;color:var(--text-xdim);font-size:.84rem}

/* ── Responsive ── */
@media(max-width:860px){.ctrl-label{display:none}}
@media(max-width:600px){.toolbar{gap:4px}.seg{font-size:.58rem;padding:3px 5px}.search-input{width:100px}}
</style>
</head>
<body>
<div class="layout">

<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: header — update title, subtitle, theme button
     ═══════════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-left">
    <h1>{{TITLE_PLAIN}} <span>{{TITLE_ACCENT}}</span></h1>
    <div class="sub" id="subtitle">{{SUBTITLE}}</div>
  </div>
  <button class="theme-btn" id="themeBtn" title="Toggle theme">&#127769;</button>
</div>

<!-- Batch tab bar — auto-generated from BATCHES, do not hardcode -->
<div class="batch-bar" id="batchBar"></div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 1: sort + size
     CUSTOMISE: adjust sort options to match your data
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar">
  <div class="ctrl"><span class="ctrl-label">Sort</span>
    <div class="segs" id="sortSegs">
      <button class="seg on" data-v="default">Default</button>
      <button class="seg" data-v="name">Name</button>
      <!-- CUSTOMISE: add more sort options matching your data keys -->
    </div>
  </div>
  <div class="ctrl"><span class="ctrl-label">Size</span>
    <button class="size-btn" onclick="resizeThumb(-20)">&#8722;</button>
    <span class="size-label" id="sizeLabel">160</span>
    <button class="size-btn" onclick="resizeThumb(+20)">+</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 2: dynamic filters + search
     Filters are auto-built from DIMS — do not hardcode buttons here
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar" id="filterBar">
  <div class="ctrl"><span class="ctrl-label">Search</span>
    <input class="filter-input search-input" id="searchInput" type="text" placeholder="filter..." oninput="render()">
  </div>
</div>

<div id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLbOutside(event)">
  <span class="lb-close" onclick="closeLb()">&#10005;</span>
  <span class="lb-btn lb-prev" onclick="lbNav(-1,event)">&#8249;</span>
  <img class="lb-img" id="lbImg" src="" alt="">
  <div class="lb-meta">
    <div class="lb-title"  id="lbTitle"></div>
    <div class="lb-tags"   id="lbTags"></div>
    <div class="lb-caption" id="lbCaption"></div>
  </div>
  <span class="lb-btn lb-next" onclick="lbNav(1,event)">&#8250;</span>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: BATCHES config
   Each batch: image dir (relative to HTML) + optional static catalogue.
   Discovery falls back to manifest.json → /api/list/ → catalogue keys.

   Example:
   const BATCHES = [
     { id:'v1', label:'First Pass',  dir:'images/v1/', ext:'.png', catalogue: CATALOGUE_V1 },
     { id:'v2', label:'Second Pass', dir:'images/v2/', ext:'.png', catalogue: CATALOGUE_V2 },
   ];
   ══════════════════════════════════════════════════════════════════ */

/* CUSTOMISE: static catalogue (optional)
   Maps filename stem → { label, tags: [] }
   Remove entries for batches where filenames are self-descriptive.

   Example:
   const CATALOGUE_V1 = {
     '001-calm-frontal': { label:'Calm · Frontal', tags:['calm','frontal','studio'] },
     '002-smile-3q':     { label:'Smile · 3Q',     tags:['smile','3q','studio'] },
   };
*/
const CATALOGUE_V1 = {
  /* {{CATALOGUE_V1_ENTRIES}} */
};

const BATCHES = [
  /* {{BATCHES_CONFIG}}
     Example:
     { id:'v1', label:'{{BATCH_1_LABEL}}', dir:'{{BATCH_1_DIR}}', ext:'.png', catalogue: CATALOGUE_V1 },
  */
];

/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: DIMS — tag-based filter dimensions
   Each key = one filter group in the toolbar.
   fn(tags) must return a string category from the item's tags array.
   order: preferred display order for buttons (optional).

   Rule: all buttons OFF = filter inactive = show everything.

   Example:
   const DIMS = {
     lighting: {
       label: 'Lighting',
       fn: tags => tags.find(t => ['studio','evening','minimal'].includes(t)) || 'other',
       order: ['studio','evening','minimal'],
     },
     expression: {
       label: 'Expression',
       fn: tags => tags.find(t => ['calm','smile','focused','direct'].includes(t)) || 'other',
       order: ['calm','smile','focused','direct'],
     },
   };
   ══════════════════════════════════════════════════════════════════ */
const DIMS = {
  /* {{DIMS_CONFIG}} */
};

/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: localStorage key prefix — change per project
   ══════════════════════════════════════════════════════════════════ */
const STORE_KEY = '{{STORE_KEY_PREFIX}}';  /* e.g. 'lyra-avatar' */

/* ══════════════════════════════════════════════════════════════════
   ENGINE — do not edit below unless extending functionality
   ══════════════════════════════════════════════════════════════════ */

const starred = new Set(JSON.parse(localStorage.getItem(STORE_KEY + '-starred') || '[]'));
const filters = {};  /* dim key → Set; empty = inactive = show all */

let allItems = [];
let visibleItems = [];
let lbIndex = 0;
let sortMode = 'default';
let thumbSize = 160;
let currentBatch = 'all';

const S = {
  theme: localStorage.getItem(STORE_KEY + '-theme') || 'dark',
};

/* ── Discovery ── */

async function discoverBatch(cfg) {
  const ext = cfg.ext || '.png';
  /* Try manifest.json */
  try {
    const r = await fetch(cfg.dir + 'manifest.json');
    if (r.ok) {
      const listing = await r.json();
      return listing
        .filter(f => f.name.endsWith(ext))
        .map(f => f.name.replace(ext, ''))
        .sort()
        .map(stem => itemFromStem(stem, cfg));
    }
  } catch (_) {}
  /* Fallback: /api/list/ */
  try {
    const r = await fetch('/api/list/' + cfg.dir);
    if (r.ok) {
      const listing = await r.json();
      return listing
        .filter(f => f.name.endsWith(ext))
        .map(f => f.name.replace(ext, ''))
        .sort()
        .map(stem => itemFromStem(stem, cfg));
    }
  } catch (_) {}
  /* Fallback: catalogue keys */
  if (cfg.catalogue && Object.keys(cfg.catalogue).length) {
    return Object.keys(cfg.catalogue).map(stem => itemFromStem(stem, cfg));
  }
  return [];
}

function itemFromStem(stem, cfg) {
  const ext = cfg.ext || '.png';
  const meta = (cfg.catalogue && cfg.catalogue[stem]) || { label: stem.replace(/-/g, ' '), tags: [] };
  return { stem, file: stem + ext, label: meta.label, tags: meta.tags || [], batch: cfg.id, dir: cfg.dir };
}

/* ── Dynamic filter builder ── */

function buildFilters(items) {
  const bar = document.getElementById('filterBar');

  for (const [key, dim] of Object.entries(DIMS)) {
    const counts = {};
    items.forEach(item => {
      const v = dim.fn(item.tags);
      counts[v] = (counts[v] || 0) + 1;
    });
    const values = Object.keys(counts).sort((a, b) => {
      if (dim.order) {
        const ia = dim.order.indexOf(a), ib = dim.order.indexOf(b);
        if (ia >= 0 && ib >= 0) return ia - ib;
        if (ia >= 0) return -1;
        if (ib >= 0) return 1;
      }
      return a.localeCompare(b);
    });

    if (values.length < 2) continue;

    filters[key] = new Set();  /* empty = inactive */

    const ctrl = document.createElement('div');
    ctrl.className = 'ctrl';
    ctrl.innerHTML = '<span class="ctrl-label">' + dim.label + '</span>';
    const group = document.createElement('div');
    group.className = 'check-group';

    for (const v of values) {
      const btn = document.createElement('button');
      btn.className = 'check-btn';
      btn.dataset.b = v;
      btn.textContent = v + ' (' + counts[v] + ')';
      btn.onclick = () => {
        btn.classList.toggle('on');
        if (btn.classList.contains('on')) filters[key].add(v);
        else filters[key].delete(v);
        render();
      };
      group.appendChild(btn);
    }
    ctrl.appendChild(group);
    bar.insertBefore(ctrl, bar.firstChild);
  }
}

/* ── Filtering ── */

function getFiltered() {
  let items = allItems.filter(item => currentBatch === 'all' || item.batch === currentBatch);

  /* Dynamic tag filters — empty set = inactive = show all */
  for (const [dim, activeSet] of Object.entries(filters)) {
    if (activeSet.size === 0) continue;
    const fn = DIMS[dim]?.fn;
    if (fn) items = items.filter(item => activeSet.has(fn(item.tags)));
  }

  /* Search */
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  if (q) items = items.filter(item =>
    item.label.toLowerCase().includes(q) ||
    item.stem.toLowerCase().includes(q) ||
    item.tags.join(' ').toLowerCase().includes(q)
  );

  return items;
}

/* ── Sorting ── */

function sortItems(items) {
  if (sortMode === 'name') return [...items].sort((a, b) => a.label.localeCompare(b.label));
  return items;  /* default: discovery order */
}

/* ── Size ── */

function resizeThumb(d) {
  thumbSize = Math.max(60, Math.min(400, thumbSize + d));
  document.getElementById('sizeLabel').textContent = thumbSize;
  render();
}

/* ── Rendering ── */

function render() {
  const el = document.getElementById('gallery');
  const filtered = sortItems(getFiltered());
  visibleItems = filtered;
  const total = allItems.length;

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">No images match the current filters.</div>';
    document.getElementById('stats').textContent = '0 / ' + total;
    return;
  }

  const cols = Math.max(2, Math.floor((window.innerWidth - 48) / (thumbSize + 8)));
  el.innerHTML = '<div class="grid" style="grid-template-columns:repeat(' + cols + ',1fr)">' +
    filtered.map((item, i) => mkCard(item, i)).join('') +
  '</div>';

  document.getElementById('stats').textContent = filtered.length + ' / ' + total;

  /* Wire star buttons */
  el.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const card = btn.closest('.img-card');
      const stem = card.dataset.stem;
      if (starred.has(stem)) {
        starred.delete(stem);
        card.classList.remove('starred');
        btn.textContent = '\u2606';
      } else {
        starred.add(stem);
        card.classList.add('starred');
        btn.textContent = '\u2605';
      }
      localStorage.setItem(STORE_KEY + '-starred', JSON.stringify([...starred]));
    });
  });

  /* Wire image clicks for lightbox */
  el.querySelectorAll('.img-card img').forEach(img => {
    img.addEventListener('click', () => {
      const card = img.closest('.img-card');
      const idx = parseInt(card.dataset.idx, 10);
      openLb(idx);
    });
  });
}

function mkCard(item, idx) {
  const isStarred = starred.has(item.stem);
  const num = item.stem.split('-')[0] || '';
  return `<div class="img-card${isStarred ? ' starred' : ''}" data-stem="${item.stem}" data-idx="${idx}">
    <span class="badge-top">${item.tags[0] ? item.tags[0].toUpperCase() : item.batch.toUpperCase()}</span>
    ${item.batch !== BATCHES[0]?.id ? `<span class="badge-batch">${item.batch.toUpperCase()}</span>` : ''}
    <img src="${item.dir}${item.file}" alt="${item.label}" loading="lazy" style="height:${thumbSize}px;min-height:${thumbSize}px">
    <div class="info">
      <div class="num">${num}</div>
      <div class="lbl">${item.label}</div>
      <div class="tags">${item.tags.map(t => `<span class="img-tag">${t}</span>`).join('')}</div>
    </div>
    <button class="star-btn" title="Star">${isStarred ? '\u2605' : '\u2606'}</button>
  </div>`;
}

/* ── Batch bar ── */

function buildBatchBar(counts) {
  const bar = document.getElementById('batchBar');
  bar.innerHTML = '';

  const total = allItems.length;
  const allBtn = document.createElement('button');
  allBtn.className = 'batch-btn active';
  allBtn.dataset.batch = 'all';
  allBtn.textContent = 'ALL (' + total + ')';
  allBtn.onclick = () => setBatch(allBtn, 'all');
  bar.appendChild(allBtn);

  for (const b of BATCHES) {
    if (!(counts[b.id] > 0)) continue;
    const btn = document.createElement('button');
    btn.className = 'batch-btn';
    btn.dataset.batch = b.id;
    btn.textContent = b.id.toUpperCase() + ' — ' + b.label + ' (' + (counts[b.id] || 0) + ')';
    btn.onclick = () => setBatch(btn, b.id);
    bar.appendChild(btn);
  }
}

function setBatch(btn, id) {
  currentBatch = id;
  document.querySelectorAll('.batch-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── Lightbox ── */

function openLb(idx) {
  lbIndex = idx;
  renderLb();
  document.getElementById('lb').classList.add('open');
}

function renderLb() {
  const item = visibleItems[lbIndex];
  if (!item) return;
  document.getElementById('lbImg').src = item.dir + item.file;
  document.getElementById('lbImg').alt = item.label;
  document.getElementById('lbTitle').textContent = item.stem.split('-')[0] + ' — ' + item.label;
  document.getElementById('lbTags').innerHTML = item.tags.map(t => `<span class="img-tag">${t}</span>`).join('');
  document.getElementById('lbCaption').textContent = item.file;
}

function lbNav(dir, e) {
  if (e) e.stopPropagation();
  if (!visibleItems.length) return;
  lbIndex = (lbIndex + dir + visibleItems.length) % visibleItems.length;
  renderLb();
}

function closeLb() { document.getElementById('lb').classList.remove('open'); }

function closeLbOutside(e) {
  if (e.target === document.getElementById('lb')) closeLb();
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  else if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'Escape') closeLb();
});

/* ── Sort wiring ── */

document.querySelectorAll('#sortSegs .seg').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#sortSegs .seg').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    sortMode = btn.dataset.v;
    render();
  };
});

/* ── Theme ── */

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '\u{1F319}' : '\u2600\uFE0F';
  localStorage.setItem(STORE_KEY + '-theme', t);
  S.theme = t;
}
document.getElementById('themeBtn').addEventListener('click', () => {
  applyTheme(S.theme === 'dark' ? 'light' : 'dark');
});

/* ── Boot ── */

(async () => {
  applyTheme(S.theme);

  if (!BATCHES.length) {
    document.getElementById('gallery').innerHTML = '<div class="empty">No BATCHES configured — fill in the BATCHES array.</div>';
    document.getElementById('stats').textContent = '0 / 0';
    return;
  }

  const results = await Promise.all(BATCHES.map(discoverBatch));
  allItems = results.flat();

  if (!allItems.length) {
    document.getElementById('gallery').innerHTML = '<div class="empty">No images found. Check BATCHES dirs and manifest.json.</div>';
    document.getElementById('stats').textContent = '0 / 0';
    return;
  }

  /* Build batch counts */
  const counts = {};
  allItems.forEach(item => { counts[item.batch] = (counts[item.batch] || 0) + 1; });

  buildBatchBar(counts);
  buildFilters(allItems);
  render();

  /* Update subtitle with counts */
  document.getElementById('subtitle').textContent = allItems.length + ' images · ' +
    BATCHES.filter(b => counts[b.id] > 0).map(b => b.id.toUpperCase() + ': ' + counts[b.id]).join(' · ');
})();
</script>
