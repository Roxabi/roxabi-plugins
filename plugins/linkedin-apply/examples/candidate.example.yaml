# Example candidate profile for LinkedIn Apply plugin
# This file contains FICTIONAL data (Alex Martin persona).
# Copy to ~/.roxabi-vault/linkedin-apply/candidate.yaml and fill in your real data.

personal:
  first_name: "Alex"
  last_name: "Martin"
  full_name: "Alex Martin"
  email: "alex.martin@example.com"
  phone: "+33600000000"
  phone_local: "0600000000"
  country_code: "+33"
  gender: "prefer_not_to_say"  # male, female, non_binary, prefer_not_to_say

address:
  street: ""
  city: "Paris"
  postal_code: "75001"
  region: "Île-de-France"
  country: "France"
  country_code: "FR"

professional:
  current_title: "Senior Software Engineer"
  years_experience: 8
  headline: "Senior Software Engineer | Python | TypeScript | Cloud"
  summary: "Senior Software Engineer with 8 years of experience building scalable web applications and APIs."

links:
  linkedin: "https://www.linkedin.com/in/alex-martin-example"
  portfolio: "https://alexmartin.example.com"
  github: "https://github.com/alex-martin-example"
  twitter: ""

cv:
  # Paths to your CV files (generated by the cv plugin)
  pdf_fr: ""
  pdf_en: ""
  html_fr: ""
  generated: ""

preferences:
  locations:
    - "Paris"
    - "Île-de-France"
    - "Remote"

  work_types:
    - "remote"
    - "hybrid"

  availability: "immediate"  # immediate, 1_month, 2_weeks, negotiable
  notice_period_weeks: 0

  salary:
    min: 65000
    max: 85000
    currency: "EUR"
    period: "yearly"

  willing_to_relocate: false
  travel_percentage: 20  # % acceptable travel

# Common ATS form answers
common_questions:
  authorized_to_work_eu: true
  authorized_to_work_fr: true
  requires_sponsorship: false

  drivers_license: true
  vehicle: true

  languages:
    - language: "French"
      level: "native"
    - language: "English"
      level: "professional"

  highest_education: "master"  # high_school, bachelor, master, phd
  references_available: true

# ATS field mappings (platform-specific field names)
ats_field_mappings:
  greenhouse:
    first_name: "first_name"
    last_name: "last_name"
    email: "email"
    phone: "phone"
    resume: "resume"
    linkedin: "question_linkedin_profile"

  lever:
    name: "name"
    email: "email"
    phone: "phone"
    resume: "resume"
    linkedin: "urls[LinkedIn]"

  workday:
    firstName: "firstName"
    lastName: "lastName"
    email: "email"
    phoneNumber: "phoneNumber"
    resume: "resume"

  smartrecruiters:
    firstName: "firstName"
    lastName: "lastName"
    email: "email"
    phoneNumber: "phoneNumber"

  ashby:
    name: "_systemfield_name"
    email: "_systemfield_email"
    phone: "_systemfield_phone"
    resume: "_systemfield_resume"
    linkedin: "_systemfield_linkedin"

# Job source tracking
provenance:
  default: "LinkedIn"
  options:
    - "LinkedIn"
    - "Indeed"
    - "Welcome to the Jungle"
    - "Direct"
