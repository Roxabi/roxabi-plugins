<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080a; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 40px 20px; }
  h1 { text-align: center; font-size: 28px; font-weight: 600; margin-bottom: 8px; color: #fff; }
  .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 40px; font-family: 'JetBrains Mono', monospace; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: #111114; border: 1px solid #1a1a1f; border-radius: 12px;
    padding: 24px 16px 16px; display: flex; flex-direction: column; align-items: center;
    transition: border-color 0.2s, transform 0.2s; cursor: pointer; position: relative;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }
  .card .number { position: absolute; top: 8px; left: 10px; font-size: 10px; color: #444; font-family: 'JetBrains Mono', monospace; }
  .card svg { width: 120px; height: 120px; margin-bottom: 14px; }
  .card .name { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .card .concept { font-size: 10px; color: #666; text-align: center; font-family: 'JetBrains Mono', monospace; }
  .card .palette { display: flex; gap: 4px; margin-top: 8px; }
  .card .palette .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #2a2a2f; }
  .section-label {
    grid-column: 1 / -1; font-size: 12px; font-weight: 500; color: #555;
    text-transform: uppercase; letter-spacing: 0.15em; padding: 10px 0 0;
    border-top: 1px solid #1a1a1f; font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<h1 id="gallery-title">Logo Gallery</h1>
<p class="subtitle" id="gallery-subtitle">generated by logo-generator</p>

<div class="grid" id="gallery"></div>

<script>
// __CONCEPTS_DATA__
// The skill may inject `const CONCEPTS = [...]` above this line,
// OR write card HTML directly into #gallery and skip this script block entirely.
//
// CONCEPTS array entry shapes:
//   Section divider : { section: "Label" }
//   Logo card       : {
//     name     : string,           // displayed name (uppercased)
//     concept  : string,           // short description shown below name
//     svg      : string,           // full inline SVG markup (no outer <svg> tag needed if viewBox supplied)
//     colors   : string[],         // 2–4 hex color strings for palette swatches
//     nameColor: string,           // optional: override name text color
//   }

if (typeof CONCEPTS !== 'undefined' && Array.isArray(CONCEPTS)) {
  const gallery = document.getElementById('gallery')
  let num = 0

  for (const c of CONCEPTS) {
    if (c.section) {
      const div = document.createElement('div')
      div.className = 'section-label'
      div.textContent = c.section
      gallery.appendChild(div)
      continue
    }

    num++
    const card = document.createElement('div')
    card.className = 'card'

    const swatches = (c.colors || []).map(col =>
      `<div class="swatch" style="background:${col}" title="${col}"></div>`
    ).join('')

    card.innerHTML = `
      <span class="number">#${String(num).padStart(2, '0')}</span>
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">${c.svg || ''}</svg>
      <div class="name" style="color:${c.nameColor || '#e0e0e0'}">${c.name || ''}</div>
      <div class="concept">${c.concept || ''}</div>
      <div class="palette">${swatches}</div>
    `
    gallery.appendChild(card)
  }
}
</script>
</body>
</html>
