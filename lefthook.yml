pre-commit:
  commands:
    lint:
      run: bunx biome check --write {staged_files}
      glob: "*.{ts,tsx,js,jsx}"
    typecheck:
      run: bun run typecheck
    trufflehog:
      run: trufflehog git file://. --only-verified --fail
      skip:
        - merge
        - rebase
    license-check:
      run: "[ -f .venv/bin/python ] && .venv/bin/python tools/license_check.py || true"

commit-msg:
  commands:
    conventional-commits:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    test:
      run: bun run test
    trufflehog:
      run: trufflehog git file://. --only-verified --fail
