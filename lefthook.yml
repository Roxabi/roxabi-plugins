pre-commit:
  commands:
    lint:
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      glob: "*.{ts,tsx,js,jsx}"
    typecheck:
      run: bun run typecheck
    detectLocalPath-guard:
      run: |
        # Fail on detectLocalPath imports outside canonical module
        # Allowed: cwd-resolver.ts (definition), github-discovery.ts (canonical consumer)
        bad=$(grep -l "detectLocalPath" plugins/dev-core/cli/lib/*.ts 2>/dev/null | grep -v "cwd-resolver.ts\|github-discovery.ts" || true)
        if [ -n "$bad" ]; then
          echo "ERROR: detectLocalPath imported outside canonical modules (cwd-resolver.ts, github-discovery.ts):"
          echo "$bad"
          exit 1
        fi
    trufflehog:
      run: scripts/trufflehog-check.sh
      skip:
        - merge
        - rebase
    license-check:
      run: "[ -f .venv/bin/python ] && .venv/bin/python tools/license_check.py || true"
    taxonomy-sync:
      run: "if [ -f .venv/bin/python ]; then .venv/bin/python tools/validate_plugins.py; else echo 'SKIP: taxonomy-sync (no .venv)' >&2; fi"

commit-msg:
  commands:
    conventional-commits:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    test:
      run: bun run test
    trufflehog:
      run: scripts/trufflehog-check.sh
