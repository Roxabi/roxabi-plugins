pre-commit:
  commands:
    lint:
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      glob: "*.{ts,tsx,js,jsx}"
    typecheck:
      run: bun run typecheck
    detectLocalPath-guard:
      run: |
        # Fail on detectLocalPath imports outside canonical module
        # Allowed: cwd-resolver.ts (definition), github-discovery.ts (canonical consumer)
        bad=$(grep -l "detectLocalPath" plugins/dev-core/cli/lib/*.ts 2>/dev/null | grep -v "cwd-resolver.ts\|github-discovery.ts" || true)
        if [ -n "$bad" ]; then
          echo "ERROR: detectLocalPath imported outside canonical modules (cwd-resolver.ts, github-discovery.ts):"
          echo "$bad"
          exit 1
        fi
    trufflehog:
      run: scripts/trufflehog-check.sh
      skip:
        - merge
        - rebase
    license-check:
      run: "[ -f .venv/bin/python ] && .venv/bin/python tools/license_check.py || true"
    taxonomy-sync:
      run: "if [ -f .venv/bin/python ]; then .venv/bin/python tools/validate_plugins.py; else echo 'SKIP: taxonomy-sync (no .venv)' >&2; fi"
    taxonomy-class-list-sync:
      run: "if [ -f .venv/bin/python ]; then .venv/bin/python tools/validate_plugins.py --check class-list-sync; else echo 'SKIP: taxonomy-class-list-sync (no .venv)' >&2; fi"
      glob: "plugins/dev-core/skills/code-review/{review-classes.yml,SKILL.md}"
    shared-sources-sync:
      run: bun run sync:shared --check
      # Covers the full shared-sources manifest (adapters/ + domain/), not just config-helpers.ts.
      glob: "**/skills/shared/**/*.ts"
    biome-manifest-sync:
      run: "if [ -f .venv/bin/python ]; then .venv/bin/python tools/validate_plugins.py --check shared-sources-sync; else echo 'SKIP: biome-manifest-sync (no .venv)' >&2; fi"
      glob: "{biome.json,tools/shared-sources.json}"
    taxonomy-subsumption-pairs:
      run: "if [ -f .venv/bin/python ]; then .venv/bin/python tools/validate_plugins.py --check subsumption-pairs; else echo 'SKIP: taxonomy-subsumption-pairs (no .venv)' >&2; fi"
      glob: "plugins/dev-core/skills/code-review/{review-classes.yml,SKILL.md}"

commit-msg:
  commands:
    conventional-commits:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    test:
      run: bun run test
    trufflehog:
      run: scripts/trufflehog-check.sh
