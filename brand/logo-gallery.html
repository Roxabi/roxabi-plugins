<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roxabi-plugins — Logo Gallery (25 concepts)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080a;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 40px;
    font-family: 'JetBrains Mono', monospace;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: #111114;
    border: 1px solid #1a1a1f;
    border-radius: 12px;
    padding: 24px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    border-color: #333;
    transform: translateY(-2px);
  }
  .card .number {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 10px;
    color: #444;
    font-family: 'JetBrains Mono', monospace;
  }
  .card svg {
    width: 120px;
    height: 120px;
    margin-bottom: 14px;
  }
  .card .name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .card .concept {
    font-size: 10px;
    color: #666;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .card .palette {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .card .palette .swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid #2a2a2f;
  }
  .section-label {
    grid-column: 1 / -1;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 10px 0 0;
    border-top: 1px solid #1a1a1f;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<h1>roxabi-plugins</h1>
<p class="subtitle">25 logo concepts — click to expand (coming soon)</p>

<div class="grid" id="gallery"></div>

      <circle cx="50" cy="55" r="5" fill="${p}" opacity="0.8"/>
    `
  },
  {
    label: "Spiral",
    concept: "Fibonacci spiral — natural growth pattern",
    colors: { primary: "#FF6B35", secondary: "#FF8F5E", bg: "#0D0D0D", surface: "#1C1C1E" },
    nameColor: "#FF8F5E",
    mark: (p, s) => `
      <path d="M 50,55 C 50,48 56,42 63,42 C 74,42 82,52 82,63 C 82,78 70,90 55,90 C 35,90 20,75 20,55 C 20,30 40,12 65,12"
        fill="none" stroke="${p}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="55" r="4" fill="${s}" opacity="0.7"/>
    `
  },
  {
    label: "Origami",
    concept: "Folded paper crane — crafted, precise",
    colors: { primary: "#3B82F6", secondary: "#60A5FA", bg: "#0A0F1A", surface: "#111827" },
    nameColor: "#60A5FA",
    mark: (p, s) => `
      <path d="M 50,15 L 85,75 L 50,60 L 15,75 Z" fill="none" stroke="${p}" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 50,15 L 50,60" stroke="${s}" stroke-width="1.5" opacity="0.5"/>
      <path d="M 50,60 L 30,90 M 50,60 L 70,90" stroke="${s}" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    `
  },
  {
    label: "Mosaic Grid",
    concept: "3×3 dot grid — modular, systematic",
    colors: { primary: "#F59E0B", secondary: "#FBBF24", bg: "#0D0B14", surface: "#1A1625" },
    nameColor: "#FBBF24",
    mark: (p, s) => {
      let dots = '';
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 3; col++) {
          const cx = 28 + col * 22;
          const cy = 33 + row * 22;
          const isCenter = row === 1 && col === 1;
          const r = isCenter ? 6 : 4;
          const color = (row + col) % 2 === 0 ? p : s;
          const op = isCenter ? 1 : 0.6;
          dots += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity="${op}"/>`;
        }
      }
      // connect center to corners
      dots += `<line x1="50" y1="55" x2="28" y2="33" stroke="${p}" stroke-width="1" opacity="0.2"/>`;
      dots += `<line x1="50" y1="55" x2="72" y2="33" stroke="${s}" stroke-width="1" opacity="0.2"/>`;
      dots += `<line x1="50" y1="55" x2="28" y2="77" stroke="${s}" stroke-width="1" opacity="0.2"/>`;
      dots += `<line x1="50" y1="55" x2="72" y2="77" stroke="${p}" stroke-width="1" opacity="0.2"/>`;
      return dots;
    }
  }
];

// ═══════════════════════════════════════════════════════════════════
// RENDER GALLERY
// ═══════════════════════════════════════════════════════════════════

const gallery = document.getElementById('gallery');
let num = 0;

for (const c of concepts) {
  // Section divider
  if (c.section) {
    const div = document.createElement('div');
    div.className = 'section-label';
    div.textContent = c.section;
    gallery.appendChild(div);
  }

  num++;
  const card = document.createElement('div');
  card.className = 'card';

  const p = c.colors.primary;
  const s = c.colors.secondary;
  const markSvg = typeof c.mark === 'function' ? c.mark(p, s) : '';

  card.innerHTML = `
    <span class="number">#${String(num).padStart(2,'0')}</span>
    <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      ${markSvg}
    </svg>
    <div class="name" style="color: ${c.nameColor}">roxabi-plugins</div>
    <div class="concept">${c.concept}</div>
    <div class="palette">
      <div class="swatch" style="background: ${c.colors.primary}" title="primary"></div>
      <div class="swatch" style="background: ${c.colors.secondary}" title="secondary"></div>
      <div class="swatch" style="background: ${c.colors.bg}" title="bg"></div>
      <div class="swatch" style="background: ${c.colors.surface}" title="surface"></div>
    </div>
  `;

  gallery.appendChild(card);
}
</script>
</body>
