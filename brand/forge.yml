# forge.yml — Project brand book: roxabi-plugins
#
# Structured brand book the forge plugin reads as a decision substrate
# for visuals generated for the roxabi-plugins project itself
# (brand galleries, logo concepts, marketing pages, architecture docs).
#
# This is the roxabi-plugins repo's OWN brand book — NOT a brand book
# for downstream projects that consume the plugin.
#
# Place this file at ONE of:
#   ~/projects/roxabi-plugins/brand/forge.yml           (preferred, versioned in repo)
#   ~/.roxabi/forge/roxabi-plugins/brand/forge.yml      (runtime mirror, not versioned)
#
# Schema: see ../plugins/forge/references/brand-book-schema.md

schema_version: 1

# ── Aesthetic ──────────────────────────────────────────────────
# Roxabi Gold — the aesthetic shared by roxabi*, 2ndBrain projects.
aesthetic: roxabi.css

# ── Palette (Roxabi Gold — extracted from roxabi.css) ──────────
# Source of truth: plugins/forge/references/aesthetics/roxabi.css
palette:
  dark:
    bg:         '#111210'   # page background — warm near-black
    surface:    '#1a1b18'   # elevated panels / cards
    border:     '#2e3028'   # warm dark border
    text:       '#f0ede6'   # warm off-white
    text-muted: '#9ca3af'   # body copy in dark mode
    text-dim:   '#7a7468'   # metadata, labels (warm gray)
    accent:     '#f0b429'   # Roxabi Gold — brand signal (one per composition)
    accent-dim: '#78460d'   # damped gold for borders / secondary highlights
  light:
    bg:         '#f8f7f4'   # warm stone
    surface:    '#f0ede8'
    border:     '#d6cfc8'
    text:       '#1c1917'   # near-black
    text-muted: '#57534e'   # warm gray
    text-dim:   '#78716c'
    accent:     '#d97706'   # amber-600 — Gold darkened for light contrast
    accent-dim: '#fef3c7'   # amber-100 wash

# ── Typography ──────────────────────────────────────────────────
# Roxabi does not lock a display font the way Lyra locks Chakra Petch.
# Defaults: Outfit for section titles / wordmark, Inter body, JetBrains Mono
# for code. Existing canonical outputs (migration-journey.html) use
# IBM Plex Sans + IBM Plex Mono + Outfit 700/800; that mix is allowed under
# the `typography: partial` override policy below.
typography:
  sans:  'Outfit'          # 700/800 — section titles, wordmark, nav
  body:  'Inter'           # 400/500 — all prose, captions, UI text
  mono:  'JetBrains Mono'  # CLI commands, config values, file paths

# ── Component defaults ──────────────────────────────────────────
# Pre-fill Style phase decisions. Content may flex individual slots
# (see allow_override.components = partial).
components:
  hero:               left-border    # understated, technical, restrained
  section_label:      dot            # consistent with forge canonical outputs
  card_default:       accent         # .card.accent — Roxabi Gold border-left
  timeline:           steps          # .steps component for sequential walks
  badges:             verdict        # .verdict-badge for active/planned/deprecated
  mermaid_theme_bias: dark           # roxabi-plugins is dark-first

# ── Structure preferences ───────────────────────────────────────
structure_defaults:
  prefer_fgraph_under: 6       # hub-and-spoke ≤ 6 peers → fgraph over mermaid
  prefer_mermaid_over: 8       # > 8 nodes → mermaid regardless of topology
  comparison_as_table: true    # matrices as HTML tables, not grid cards

# ── Canonical examples ──────────────────────────────────────────
# Canonical outputs the Deliver phase can spot-check against for visual
# consistency. All verified to exist under ~/.roxabi/forge/roxabi-plugins/.
examples:
  - ~/.roxabi/forge/roxabi-plugins/visuals/migration-journey.html        # latest, gold, roxabi.css tokens inlined
  - ~/.roxabi/forge/roxabi-plugins/brand/brand-gallery.html               # brand asset gallery (showcase)
  - ~/.roxabi/forge/roxabi-plugins/brand/logo-gallery-v4-images.html      # AI-generated logo grid
  - ~/.roxabi/forge/roxabi-plugins/brand/roxabi-plugins-dark-premium.html # single logo preview, gold on dark
  - ~/.roxabi/forge/roxabi-plugins/brand/roxabi-plugins-logo.html         # wordmark logo page

# ── Deliver constraints ─────────────────────────────────────────
# Hard verification rules — Deliver phase checks every generated output
# against these and fails loudly if any rule is violated.
deliver_must_match:
  - 'accent color is Roxabi Gold (#f0b429 dark / #d97706 light)'
  - 'hero uses .hero.left-border variant (not .elevated, not .top-border)'
  - 'section labels use .section-label.dot prefix'
  - 'body copy color is var(--text-muted), not var(--text-dim)'
  - 'Mermaid diagrams wrapped in .diagram-shell with zoom controls'
  - 'no emoji in section headers'
  - 'no ASCII art in <pre class="arch"> blocks'
  - 'JetBrains Mono reserved for CLI commands / config / file paths'
  - 'no "AI-powered", "next-generation", "seamless" in marketing copy'

# ── Override policy ─────────────────────────────────────────────
# roxabi-plugins brand is less mature than Lyra's — lock the aesthetic
# and palette but leave typography and components with room to flex
# until more canonical outputs stabilize the system.
allow_override:
  aesthetic:  locked     # Roxabi Gold is authoritative — never deviate
  palette:    locked     # Colors always from roxabi.css
  typography: partial    # Outfit/Inter/JetBrains preferred; IBM Plex allowed where already in use
  components: partial    # Hero/label/card default from brand; content may flex
  structure:  open       # Content topology decides; brand is tiebreak only
  examples:   advisory   # Examples guide; don't hard-fail on legitimate divergence

# ── Project metadata ────────────────────────────────────────────
project:
  name: 'roxabi-plugins'
  full_name: 'Roxabi Plugins'
  tagline: 'Context engineering tools for teams using Claude Code.'
  category: 'Claude Code plugin marketplace'
  brand_book: 'pending'  # no BRAND-BOOK.md yet — this file is the source of truth
