<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roxabi-plugins — Logo Gallery v4 (AI Generated)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080a; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 40px 20px; }
  h1 { text-align: center; font-size: 28px; font-weight: 600; margin-bottom: 8px; color: #fff; }
  .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 40px; font-family: 'JetBrains Mono', monospace; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .card {
    background: #111114;
    border: 1px solid #1a1a1f;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover { border-color: #444; transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .card .number {
    position: absolute; top: 8px; left: 10px; z-index: 2;
    font-size: 11px; color: #fff; font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px;
  }
  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }
  .card .info {
    padding: 12px 14px;
  }
  .card .label {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 3px;
  }
  .card .style {
    font-size: 10px;
    color: #666;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.92); z-index: 1000;
    justify-content: center; align-items: center; flex-direction: column;
    cursor: pointer;
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 80vw; max-height: 80vh; border-radius: 12px; }
  .lightbox .caption {
    margin-top: 16px; color: #999; font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .lightbox .nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 36px; color: #555; cursor: pointer; padding: 20px;
    user-select: none;
  }
  .lightbox .nav:hover { color: #fff; }
  .lightbox .nav.prev { left: 20px; }
  .lightbox .nav.next { right: 20px; }
  .lightbox .close {
    position: absolute; top: 20px; right: 20px;
    font-size: 24px; color: #666; cursor: pointer;
  }
  .lightbox .close:hover { color: #fff; }
</style>
</head>
<body>

<h1>roxabi-plugins</h1>
<p class="subtitle">25 AI-generated logo concepts — click to enlarge</p>

<div class="grid" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">✕</span>
  <span class="nav prev" onclick="navLightbox(-1)">‹</span>
  <span class="nav next" onclick="navLightbox(1)">›</span>
  <img id="lb-img" src="" alt="">
  <div class="caption" id="lb-caption"></div>
</div>

<script>
const items = [
  { file: "01-hex-3d-glass",       label: "3D Glass Hex",        style: "Frosted glass, orange glow" },
  { file: "02-hex-neon-wireframe", label: "Neon Wireframe",      style: "Cyan neon lines on black" },
  { file: "03-honeycomb-metallic", label: "Metallic Honeycomb",  style: "Brushed titanium, orange core" },
  { file: "04-constellation-dots", label: "Constellation",       style: "Luminous dots, thin lines" },
  { file: "05-plug-abstract-3d",   label: "Abstract Plug",       style: "Purple + gold 3D halves" },
  { file: "06-node-graph-glow",    label: "Node Graph",          style: "Glass spheres, cyan threads" },
  { file: "07-hex-gem-faceted",    label: "Faceted Gem",         style: "Cut hexagonal gemstone" },
  { file: "08-circuit-hex-flat",   label: "Circuit Board",       style: "Flat PCB traces, green" },
  { file: "09-particle-sphere",    label: "Particle Sphere",     style: "Dot sphere, orange network" },
  { file: "10-origami-hex",        label: "Origami Hex",         style: "Folded paper, rim light" },
  { file: "11-hex-hologram",       label: "Hologram",            style: "Holographic projection" },
  { file: "12-mosaic-dots-grid",   label: "Mosaic Grid",         style: "Glass bead grid, orange" },
  { file: "13-liquid-metal-hex",   label: "Liquid Metal",        style: "Gunmetal + lava cracks" },
  { file: "14-blueprint-hex",      label: "Blueprint",           style: "Technical drawing, cyan" },
  { file: "15-nebula-hex",         label: "Nebula Hex",          style: "Cosmic gas in hex shape" },
  { file: "16-isometric-blocks",   label: "Isometric Blocks",    style: "Hex columns, purple+gold" },
  { file: "17-zen-stones-hex",     label: "Zen Stones",          style: "River stones, orange vein" },
  { file: "18-electric-nodes",     label: "Electric Nodes",      style: "Chrome spheres, arcs" },
  { file: "19-stained-glass-hex",  label: "Stained Glass",       style: "Backlit glass panels" },
  { file: "20-magnetic-field",     label: "Magnetic Field",      style: "Iron filing pattern" },
  { file: "21-embossed-leather",   label: "Embossed Leather",    style: "Leather + orange foil" },
  { file: "22-data-flow-hex",      label: "Data Flow",           style: "Green data particles" },
  { file: "23-crystal-growth",     label: "Crystal Growth",      style: "Obsidian hex columns" },
  { file: "24-sound-wave-hex",     label: "Sound Wave",          style: "Waveform hex edges" },
  { file: "25-ink-brush-hex",      label: "Ink Brush",           style: "Bold brush stroke hex" },
];

const gallery = document.getElementById('gallery');

items.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openLightbox(i);
  card.innerHTML = `
    <span class="number">#${String(i+1).padStart(2,'0')}</span>
    <img src="generated/${item.file}.png" alt="${item.label}" loading="lazy"
      onerror="this.style.background='#1a1a1f';this.style.minHeight='200px';this.alt='generating...'">
    <div class="info">
      <div class="label">${item.label}</div>
      <div class="style">${item.style}</div>
    </div>
  `;
  gallery.appendChild(card);
});

// Lightbox
let currentIdx = 0;
function openLightbox(i) {
  currentIdx = i;
  document.getElementById('lb-img').src = `generated/${items[i].file}.png`;
  document.getElementById('lb-caption').textContent = `#${String(i+1).padStart(2,'0')} ${items[i].label} — ${items[i].style}`;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
function navLightbox(dir) {
  currentIdx = (currentIdx + dir + items.length) % items.length;
  openLightbox(currentIdx);
  event.stopPropagation();
}
document.getElementById('lightbox').onclick = (e) => { if (e.target.id === 'lightbox') closeLightbox(); };
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});
</script>
</body>
</html>
