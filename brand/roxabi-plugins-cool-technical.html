<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Preview — cool-technical</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: var(--wordmark-font);
    background: var(--bg);
  }

  /* === CONTROLS PANEL === */
  .controls {
    position: fixed;
    top: 0; right: 0;
    width: 320px;
    height: 100vh;
    background: #0c1525ee;
    border-left: 1px solid #1a2a44;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #8899aa;
  }
  .controls.open { transform: translateX(0); }

  .controls h3 {
    color: #eef4ff;
    font-size: 13px;
    margin: 16px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .controls h3:first-child { margin-top: 0; }

  .controls label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 6px 0;
    gap: 8px;
  }
  .controls label span { flex: 1; }

  .controls input[type="color"] {
    width: 32px; height: 24px;
    border: 1px solid #2a3a54;
    background: none;
    cursor: pointer;
    border-radius: 3px;
  }
  .controls input[type="range"] {
    width: 100px;
    accent-color: var(--primary);
  }
  .controls input[type="text"],
  .controls input[type="number"] {
    width: 100px;
    background: #0a1020;
    border: 1px solid #2a3a54;
    color: #eef4ff;
    padding: 3px 6px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
  }
  .controls select {
    width: 100px;
    background: #0a1020;
    border: 1px solid #2a3a54;
    color: #eef4ff;
    padding: 3px 6px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
  }
  .controls button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 8px;
    background: #1a2a44;
    border: 1px solid #2a3a54;
    color: #eef4ff;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .controls button:hover { background: #243454; }
  .controls button.primary-btn {
    background: var(--primary);
    color: #060b17;
    font-weight: bold;
  }

  .toggle-controls {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 101;
    width: 36px; height: 36px;
    background: #1a2a44cc;
    border: 1px solid #2a3a54;
    color: #eef4ff;
    cursor: pointer;
    border-radius: 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .controls .section { border-bottom: 1px solid #1a2a44; padding-bottom: 12px; margin-bottom: 4px; }
  .controls .hint { font-size: 10px; color: #556677; margin-top: 2px; }

  /* === LOGO === */
  .logo-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg-particles {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  svg.logo { position: relative; z-index: 1; }

  .wordmark {
    position: relative; z-index: 1;
    margin-top: 28px;
    font-weight: var(--wordmark-weight);
    letter-spacing: var(--wordmark-tracking);
    background: linear-gradient(135deg, #b0c4de 0%, var(--highlight) 35%, var(--primary) 65%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
  }

  .tagline {
    position: relative; z-index: 1;
    margin-top: 10px;
    font-family: var(--tagline-font);
    font-size: 11px;
    letter-spacing: var(--tagline-tracking);
    color: #5a7a9a;
    text-transform: uppercase;
    opacity: 0;
  }
@keyframes wordmarkIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<button class="toggle-controls" id="toggleBtn" title="Toggle controls">&#9881;</button>

<div class="controls" id="controlsPanel">
  <div class="section">
    <h3>Identity</h3>
    <label><span>Name</span> <input type="text" id="ctrl-name" value=""></label>
    <label><span>Tagline</span> <input type="text" id="ctrl-tagline" value="" style="width:140px"></label>
    <label><span>Font size</span> <input type="range" id="ctrl-fontsize" min="24" max="64" value="42"></label>
  </div>

  <div class="section">
    <h3>Colors</h3>
    <label><span>Primary</span> <input type="color" id="ctrl-primary" value="#00d4ff"></label>
    <label><span>Secondary</span> <input type="color" id="ctrl-secondary" value="#8b5cf6"></label>
    <label><span>Background</span> <input type="color" id="ctrl-bg" value="#060b17"></label>
    <label><span>Surface</span> <input type="color" id="ctrl-surface" value="#0b1422"></label>
    <label><span>Highlight</span> <input type="color" id="ctrl-highlight" value="#eef4ff"></label>
  </div>

  <div class="section">
    <h3>Frame</h3>
    <label><span>Shape</span>
      <select id="ctrl-frame-shape">
        <option value="hexagon">Hexagon</option>
        <option value="circle">Circle</option>
        <option value="rounded-square">Rounded Square</option>
        <option value="none">None</option>
      </select>
    </label>
    <label><span>Border width</span> <input type="range" id="ctrl-border-width" min="0.5" max="4" step="0.5" value="2"></label>
    <label><span>Connectors</span> <input type="checkbox" id="ctrl-connectors" checked></label>
  </div>

  <div class="section">
    <h3>Mark</h3>
    <label><span>Arm width</span> <input type="range" id="ctrl-arm-width" min="1" max="5" step="0.5" value="2.5"></label>
    <label><span>Node size</span> <input type="range" id="ctrl-node-size" min="1" max="8" step="0.5" value="4"></label>
    <label><span>Hub size</span> <input type="range" id="ctrl-hub-size" min="3" max="14" step="1" value="7"></label>
    <label><span>Hub glow</span> <input type="range" id="ctrl-hub-glow" min="10" max="50" step="2" value="28"></label>
    <label><span>Glow intensity</span> <input type="range" id="ctrl-glow-std" min="1" max="8" step="0.5" value="3"></label>
  </div>

  <div class="section">
    <h3>Animation</h3>
    <label><span>Speed</span>
      <select id="ctrl-speed">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </label>
    <label><span>Particles</span> <input type="range" id="ctrl-particles" min="0" max="100" step="5" value="55"></label>
    <label><span>Hub pulse</span> <input type="checkbox" id="ctrl-hub-pulse" checked></label>
    <label><span>Data flow</span> <input type="checkbox" id="ctrl-data-flow" checked></label>
    <label><span>Node breathing</span> <input type="checkbox" id="ctrl-node-breathing" checked></label>
  </div>

  <div class="section">
    <h3>Actions</h3>
    <button onclick="replayAnimation()">Replay Animation</button>
    <button onclick="exportBrief()">Export Brief (JSON)</button>
    <button onclick="copyBrief()">Copy Brief to Clipboard</button>
    <p class="hint">Export saves the current config as a reusable brief file</p>
  </div>
</div>

<svg class="bg-particles" xmlns="http://www.w3.org/2000/svg">
  <g id="bgParticlesGroup"></g>
</svg>

<div class="logo-container" id="logoContainer">
  <svg class="logo" id="logoSvg" viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  </svg>
  <div class="wordmark" id="wordmark"></div>
  <div class="tagline" id="tagline"></div>
</div>

<script>
// =====================================================================
// LOGO ENGINE — Config-driven SVG logo renderer
// =====================================================================

// Default brief — overridden by loadBrief() or controls
let BRIEF = null;

// ── Helpers ──────────────────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function blendColors(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  const r = Math.round(a.r + (b.r - a.r) * t);
  const g = Math.round(a.g + (b.g - a.g) * t);
  const bl = Math.round(a.b + (b.b - a.b) * t);
  return `rgb(${r},${g},${bl})`;
}

function resolveColor(token, colors) {
  if (!token) return colors.primary;
  if (token.startsWith('#') || token.startsWith('rgb')) return token;
  if (token === 'primary') return colors.primary;
  if (token === 'secondary') return colors.secondary;
  if (token === 'highlight') return colors.highlight;
  if (token === 'blend') return blendColors(colors.primary, colors.secondary, 0.5);
  if (token === 'gradient') return `url(#mainGrad)`;
  return token;
}

function svgEl(tag, attrs = {}, children = []) {
  const ns = 'http://www.w3.org/2000/svg';
  const el = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v !== undefined && v !== null) el.setAttribute(k, v);
  }
  for (const child of children) {
    if (typeof child === 'string') {
      el.innerHTML += child;
    } else {
      el.appendChild(child);
    }
  }
  return el;
}

function animateAttr(attr, from, to, dur, begin, opts = {}) {
  const a = { attributeName: attr, from, to, dur: dur + 's', begin: begin + 's', fill: 'freeze' };
  if (opts.repeatCount) a.repeatCount = opts.repeatCount;
  if (opts.values) { delete a.from; delete a.to; a.values = opts.values; }
  if (opts.keyTimes) a.keyTimes = opts.keyTimes;
  if (opts.calcMode) { a.calcMode = opts.calcMode; a.keySplines = opts.keySplines; }
  return svgEl('animate', a);
}

// ── Hexagon geometry ─────────────────────────────────────────────────

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 2;
    pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
  }
  return pts.join(' ');
}

function hexPerimeter(r) { return 6 * r; }

function circlePoints(cx, cy, r) { return { cx, cy, r }; }

function roundedSquareD(cx, cy, size, radius) {
  const half = size / 2;
  const x = cx - half, y = cy - half;
  return `M${x + radius},${y} h${size - 2*radius} a${radius},${radius} 0 0 1 ${radius},${radius} v${size - 2*radius} a${radius},${radius} 0 0 1 -${radius},${radius} h-${size - 2*radius} a${radius},${radius} 0 0 1 -${radius},-${radius} v-${size - 2*radius} a${radius},${radius} 0 0 1 ${radius},-${radius} z`;
}

// ── Frame renderer ───────────────────────────────────────────────────

function renderFrame(svg, brief, speed) {
  const { colors, frame } = brief;
  const cx = 200, cy = 200, radius = 162;
  const g = svgEl('g', { id: 'hexFrame' });
  const seq = brief.animation.sequence;
  const bgDelay = (seq.find(s => s.step === 'frame_bg')?.delay || 0.3) / speed;
  const traceDelay = (seq.find(s => s.step === 'border_trace')?.delay || 0.5) / speed;
  const traceDur = (seq.find(s => s.step === 'border_trace')?.duration || 1.5) / speed;
  const innerDelay = (seq.find(s => s.step === 'inner_border')?.delay || 1.8) / speed;

  if (frame.shape === 'hexagon') {
    const pts = hexPoints(cx, cy, radius);
    const ptsInner = hexPoints(cx, cy, radius - 6);
    const perim = hexPerimeter(radius);

    // Background fill
    const bg = svgEl('polygon', { points: pts, fill: colors.surface, opacity: 0 }, [
      animateAttr('opacity', 0, 1, 0.6 / speed, bgDelay)
    ]);
    g.appendChild(bg);

    // Traced border
    const border = svgEl('polygon', {
      points: pts, fill: 'none', stroke: 'url(#borderGrad)',
      'stroke-width': frame.border_width, 'stroke-dasharray': perim,
      'stroke-dashoffset': perim, 'stroke-linejoin': 'round'
    }, [
      animateAttr('stroke-dashoffset', perim, 0, traceDur, traceDelay,
        { calcMode: 'spline', keySplines: '0.4 0 0.2 1' })
    ]);
    g.appendChild(border);

    // Inner border
    if (frame.inner_border) {
      const inner = svgEl('polygon', {
        points: ptsInner, fill: 'none', stroke: colors.primary,
        'stroke-width': 0.5, 'stroke-opacity': 0.15, opacity: 0
      }, [
        animateAttr('opacity', 0, 1, 0.6 / speed, innerDelay)
      ]);
      g.appendChild(inner);
    }
  } else if (frame.shape === 'circle') {
    // Background
    const bg = svgEl('circle', { cx, cy, r: radius, fill: colors.surface, opacity: 0 }, [
      animateAttr('opacity', 0, 1, 0.6 / speed, bgDelay)
    ]);
    g.appendChild(bg);

    const perim = 2 * Math.PI * radius;
    const border = svgEl('circle', {
      cx, cy, r: radius, fill: 'none', stroke: 'url(#borderGrad)',
      'stroke-width': frame.border_width, 'stroke-dasharray': perim,
      'stroke-dashoffset': perim
    }, [
      animateAttr('stroke-dashoffset', perim, 0, traceDur, traceDelay,
        { calcMode: 'spline', keySplines: '0.4 0 0.2 1' })
    ]);
    g.appendChild(border);

    if (frame.inner_border) {
      const inner = svgEl('circle', {
        cx, cy, r: radius - 6, fill: 'none', stroke: colors.primary,
        'stroke-width': 0.5, 'stroke-opacity': 0.15, opacity: 0
      }, [
        animateAttr('opacity', 0, 1, 0.6 / speed, innerDelay)
      ]);
      g.appendChild(inner);
    }
  } else if (frame.shape === 'rounded-square') {
    const size = radius * 1.7;
    const d = roundedSquareD(cx, cy, size, 24);
    const pathLen = size * 4;

    const bg = svgEl('path', { d, fill: colors.surface, opacity: 0 }, [
      animateAttr('opacity', 0, 1, 0.6 / speed, bgDelay)
    ]);
    g.appendChild(bg);

    const border = svgEl('path', {
      d, fill: 'none', stroke: 'url(#borderGrad)',
      'stroke-width': frame.border_width, 'stroke-dasharray': pathLen,
      'stroke-dashoffset': pathLen, 'stroke-linejoin': 'round'
    }, [
      animateAttr('stroke-dashoffset', pathLen, 0, traceDur, traceDelay,
        { calcMode: 'spline', keySplines: '0.4 0 0.2 1' })
    ]);
    g.appendChild(border);
  }

  svg.appendChild(g);

  // Connectors
  if (frame.connectors?.enabled) {
    const connDelay = (seq.find(s => s.step === 'connectors')?.delay || 3.6) / speed;
    const cg = svgEl('g', { id: 'connectors', opacity: 0 }, [
      animateAttr('opacity', 0, 1, 0.5 / speed, connDelay)
    ]);

    const positions = frame.connectors.positions || [];
    const connDefs = {
      left:   { x1: 58, y1: 200, x2: 28, y2: 200, color: colors.primary },
      right:  { x1: 342, y1: 200, x2: 372, y2: 200, color: colors.secondary },
      top:    { x1: 200, y1: 38, x2: 200, y2: 14, color: colors.primary },
      bottom: { x1: 200, y1: 362, x2: 200, y2: 386, color: colors.secondary }
    };
    const dotPos = { left: [24, 200], right: [376, 200], top: [200, 10], bottom: [200, 390] };

    for (const pos of positions) {
      const c = connDefs[pos];
      if (!c) continue;
      cg.appendChild(svgEl('line', {
        x1: c.x1, y1: c.y1, x2: c.x2, y2: c.y2,
        stroke: c.color, 'stroke-width': 1, 'stroke-opacity': 0.4
      }));
      const dp = dotPos[pos];
      cg.appendChild(svgEl('circle', { cx: dp[0], cy: dp[1], r: 2.5, fill: c.color, opacity: 0.5 }));
    }
    svg.appendChild(cg);
  }
}

// ── Mark renderer ────────────────────────────────────────────────────

function renderMark(svg, brief, speed) {
  const { colors, mark } = brief;
  const g = svgEl('g', { id: 'mark' });

  // Render elements (paths, lines)
  for (const el of (mark.elements || [])) {
    const strokeColor = resolveColor(el.stroke, colors);
    const delay = (el.trace_delay || 2) / speed;
    const dur = (el.trace_duration || 1) / speed;

    if (el.type === 'path') {
      const pathEl = svgEl('path', {
        d: el.d, fill: el.fill || 'none', stroke: strokeColor,
        'stroke-width': el.stroke_width || 2.5,
        'stroke-linecap': 'round', filter: 'url(#glow)',
        'stroke-dasharray': 500, 'stroke-dashoffset': 500
      }, [
        animateAttr('stroke-dashoffset', 500, 0, dur, delay,
          { calcMode: 'spline', keySplines: '0.4 0 0.2 1' })
      ]);
      g.appendChild(pathEl);
    } else if (el.type === 'line') {
      const len = Math.hypot(el.x2 - el.x1, el.y2 - el.y1);
      const lineEl = svgEl('line', {
        x1: el.x1, y1: el.y1, x2: el.x2, y2: el.y2,
        stroke: resolveColor(el.stroke, colors),
        'stroke-width': el.stroke_width || 2,
        'stroke-linecap': 'round', filter: 'url(#glow)',
        'stroke-dasharray': len, 'stroke-dashoffset': len
      }, [
        animateAttr('stroke-dashoffset', len, 0, dur, delay)
      ]);
      g.appendChild(lineEl);
    }
  }

  // Render nodes
  for (const node of (mark.nodes || [])) {
    const color = resolveColor(node.color, colors);
    const delay = (node.delay || 3) / speed;

    // Outer glow
    g.appendChild(svgEl('circle', {
      cx: node.cx, cy: node.cy, r: 0, fill: color, filter: 'url(#glow)'
    }, [
      animateAttr('r', 0, node.r, 0.3 / speed, delay,
        { calcMode: 'spline', keySplines: '0.5 1.8 0.5 1' })
    ]));

    // Inner highlight
    g.appendChild(svgEl('circle', {
      cx: node.cx, cy: node.cy, r: 0, fill: colors.highlight
    }, [
      animateAttr('r', 0, node.r * 0.35, 0.3 / speed, delay)
    ]));
  }

  // Render hub
  if (mark.hub) {
    const hub = mark.hub;
    const hubColor = resolveColor(hub.color, colors);
    const delay = (hub.delay || 3.5) / speed;

    // Glow disc
    g.appendChild(svgEl('circle', {
      cx: hub.cx, cy: hub.cy, r: 0, fill: `url(#hubGlow)`
    }, [
      animateAttr('r', 0, hub.glow_radius, 0.5 / speed, delay)
    ]));

    // Main disc
    g.appendChild(svgEl('circle', {
      cx: hub.cx, cy: hub.cy, r: 0, fill: hubColor, filter: 'url(#softGlow)'
    }, [
      animateAttr('r', 0, hub.main_radius, 0.4 / speed, delay,
        { calcMode: 'spline', keySplines: '0.5 1.8 0.5 1' })
    ]));

    // Center
    g.appendChild(svgEl('circle', {
      cx: hub.cx, cy: hub.cy, r: 0, fill: colors.highlight
    }, [
      animateAttr('r', 0, hub.center_radius, 0.4 / speed, delay)
    ]));

    // Shockwave rings
    const rings = hub.shockwave_rings || 3;
    for (let i = 0; i < rings; i++) {
      const ringDelay = delay + (0.2 * i) / speed;
      const ringDur = (0.8 + i * 0.2) / speed;
      const ringR = 45 + i * 18;
      const ringColor = i < rings - 1 ? hubColor : colors.primary;
      const ring = svgEl('circle', {
        cx: hub.cx, cy: hub.cy, r: hub.main_radius,
        fill: 'none', stroke: ringColor,
        'stroke-width': 1.5 - i * 0.3, opacity: 0
      }, [
        animateAttr('r', hub.main_radius, ringR, ringDur, ringDelay),
        animateAttr('opacity', 0.7 - i * 0.2, 0, ringDur, ringDelay)
      ]);
      g.appendChild(ring);
    }
  }

  svg.appendChild(g);
}

// ── Idle animations ──────────────────────────────────────────────────

function renderIdle(svg, brief, speed) {
  const { colors, mark, animation } = brief;
  const idle = animation.idle;
  const g = svgEl('g', { id: 'idleLayer' });
  const idleStart = (brief.animation.intro_duration_s || 5) / speed;

  // Hub pulse
  if (idle.hub_pulse?.enabled && mark.hub) {
    const hub = mark.hub;
    const hubColor = resolveColor(hub.color, colors);
    const dur = (idle.hub_pulse.duration || 2.5) / speed;
    g.appendChild(svgEl('circle', {
      cx: hub.cx, cy: hub.cy, r: hub.main_radius,
      fill: 'none', stroke: hubColor, 'stroke-width': 1, opacity: 0
    }, [
      animateAttr('r', hub.main_radius, 35, dur, idleStart, { repeatCount: 'indefinite' }),
      animateAttr('opacity', 0.4, 0, dur, idleStart, { repeatCount: 'indefinite' })
    ]));
  }

  // Node breathing
  if (idle.node_breathing?.enabled) {
    const dur = (idle.node_breathing.duration || 2) / speed;
    for (const node of (mark.nodes || []).slice(0, 4)) {
      const color = resolveColor(node.color, colors);
      g.appendChild(svgEl('circle', {
        cx: node.cx, cy: node.cy, r: node.r, fill: color, opacity: 0
      }, [
        animateAttr('opacity', null, null, dur, idleStart + Math.random(),
          { values: '0.2;0.5;0.2', keyTimes: '0;0.5;1', repeatCount: 'indefinite' })
      ]));
    }
  }

  // Data particles along paths
  if (idle.data_particles?.enabled && mark.elements) {
    for (const el of mark.elements.filter(e => e.type === 'path')) {
      const dur = (2 + Math.random()) / speed;
      const particle = svgEl('circle', {
        r: 2, fill: colors.primary, opacity: 0, filter: 'url(#glow)'
      }, [
        svgEl('animateMotion', { path: el.d, dur: dur + 's', begin: idleStart + 's', repeatCount: 'indefinite' }),
        animateAttr('opacity', null, null, dur, idleStart,
          { values: '0;0.8;0.8;0', keyTimes: '0;0.1;0.8;1', repeatCount: 'indefinite' }),
        animateAttr('fill', null, null, dur, idleStart,
          { values: `${colors.primary};${colors.primary};${colors.secondary}`,
            keyTimes: '0;0.5;1', repeatCount: 'indefinite' })
      ]);
      g.appendChild(particle);
    }
  }

  // Border glow
  if (idle.border_glow?.enabled) {
    const dur = (idle.border_glow.duration || 4) / speed;
    const cx = 200, cy = 200, r = 162;
    if (brief.frame.shape === 'hexagon') {
      g.appendChild(svgEl('polygon', {
        points: hexPoints(cx, cy, r), fill: 'none', stroke: colors.primary,
        'stroke-width': 1, 'stroke-linejoin': 'round', opacity: 0
      }, [
        animateAttr('opacity', null, null, dur, idleStart,
          { values: '0;0.08;0.15;0.08;0', keyTimes: '0;0.25;0.5;0.75;1', repeatCount: 'indefinite' })
      ]));
    } else if (brief.frame.shape === 'circle') {
      g.appendChild(svgEl('circle', {
        cx, cy, r, fill: 'none', stroke: colors.primary,
        'stroke-width': 1, opacity: 0
      }, [
        animateAttr('opacity', null, null, dur, idleStart,
          { values: '0;0.08;0.15;0.08;0', keyTimes: '0;0.25;0.5;0.75;1', repeatCount: 'indefinite' })
      ]));
    }
  }

  svg.appendChild(g);
}

// ── Background particles ─────────────────────────────────────────────

function renderBgParticles(brief) {
  const g = document.getElementById('bgParticlesGroup');
  g.innerHTML = '';
  const idle = brief.animation.idle;
  if (!idle.bg_particles?.enabled) return;

  const count = idle.bg_particles.count || 55;
  const w = window.innerWidth, h = window.innerHeight;

  for (let i = 0; i < count; i++) {
    const x = Math.random() * w;
    const startY = h + Math.random() * 200;
    const r = 0.5 + Math.random() * 1.5;
    const dur = 15 + Math.random() * 25;
    const delay = Math.random() * dur;
    const opacity = 0.05 + Math.random() * 0.15;
    const color = Math.random() > 0.6 ? brief.colors.secondary : brief.colors.primary;

    const circle = svgEl('circle', { cx: x, cy: startY, r, fill: color, opacity }, [
      svgEl('animate', { attributeName: 'cy', from: startY, to: -20, dur: dur + 's', begin: delay + 's', repeatCount: 'indefinite' }),
      svgEl('animate', { attributeName: 'cx', values: `${x};${x + (Math.random() - 0.5) * 60};${x}`, dur: (dur * 0.7) + 's', begin: delay + 's', repeatCount: 'indefinite' })
    ]);
    g.appendChild(circle);
  }
}

// ── Defs (gradients, filters) ────────────────────────────────────────

function renderDefs(svg, brief) {
  const { colors } = brief;
  const hubColor = resolveColor(brief.mark.hub?.color, colors);

  const defs = svgEl('defs', {}, [
    // Border gradient
    svgEl('linearGradient', { id: 'borderGrad', x1: '0%', y1: '0%', x2: '100%', y2: '100%' }, [
      svgEl('stop', { offset: '0%', 'stop-color': colors.primary }),
      svgEl('stop', { offset: '50%', 'stop-color': colors.secondary }),
      svgEl('stop', { offset: '100%', 'stop-color': colors.primary, 'stop-opacity': '0.6' })
    ]),
    // Main gradient (for paths)
    svgEl('linearGradient', { id: 'mainGrad', x1: '0%', y1: '0%', x2: '0%', y2: '100%' }, [
      svgEl('stop', { offset: '0%', 'stop-color': colors.primary }),
      svgEl('stop', { offset: '100%', 'stop-color': colors.secondary })
    ]),
    // Hub glow radial
    svgEl('radialGradient', { id: 'hubGlow', cx: '50%', cy: '50%', r: '50%' }, [
      svgEl('stop', { offset: '0%', 'stop-color': hubColor, 'stop-opacity': '0.5' }),
      svgEl('stop', { offset: '100%', 'stop-color': hubColor, 'stop-opacity': '0' })
    ]),
    // Glow filter
    svgEl('filter', { id: 'glow', x: '-50%', y: '-50%', width: '200%', height: '200%' }, [
      svgEl('feGaussianBlur', { stdDeviation: brief._glowStd || 3, result: 'blur' }),
      svgEl('feComposite', { in: 'SourceGraphic', in2: 'blur', operator: 'over' })
    ]),
    // Soft glow filter
    svgEl('filter', { id: 'softGlow', x: '-50%', y: '-50%', width: '200%', height: '200%' }, [
      svgEl('feGaussianBlur', { stdDeviation: 6, result: 'blur' }),
      svgEl('feComposite', { in: 'SourceGraphic', in2: 'blur', operator: 'over' })
    ])
  ]);

  svg.appendChild(defs);
}

// ── Main render ──────────────────────────────────────────────────────

function render(brief) {
  BRIEF = brief;
  const speed = parseFloat(document.getElementById('ctrl-speed')?.value || 1);

  // Set CSS custom properties
  const root = document.documentElement.style;
  root.setProperty('--bg', brief.colors.background);
  root.setProperty('--primary', brief.colors.primary);
  root.setProperty('--secondary', brief.colors.secondary);
  root.setProperty('--highlight', brief.colors.highlight);
  root.setProperty('--wordmark-font', brief.typography.wordmark_font);
  root.setProperty('--wordmark-weight', brief.typography.wordmark_weight);
  root.setProperty('--wordmark-tracking', brief.typography.wordmark_tracking_em + 'em');
  root.setProperty('--tagline-font', brief.typography.tagline_font);
  root.setProperty('--tagline-tracking', brief.typography.tagline_tracking_em + 'em');

  // Google font
  if (brief.typography.google_font_import) {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = brief.typography.google_font_import;
    document.head.appendChild(link);
  }

  // Clear and rebuild SVG
  const svg = document.getElementById('logoSvg');
  svg.innerHTML = '';
  renderDefs(svg, brief);
  renderFrame(svg, brief, speed);
  renderMark(svg, brief, speed);
  renderIdle(svg, brief, speed);

  // Wordmark & tagline
  const wordmark = document.getElementById('wordmark');
  const tagline = document.getElementById('tagline');
  wordmark.textContent = brief.identity.name.toUpperCase();
  tagline.textContent = brief.identity.tagline;

  const fontSize = document.getElementById('ctrl-fontsize')?.value || 42;
  wordmark.style.fontSize = fontSize + 'px';

  const wmDelay = (brief.animation.sequence.find(s => s.step === 'wordmark')?.delay || 4.2) / speed;
  const tlDelay = (brief.animation.sequence.find(s => s.step === 'tagline')?.delay || 5) / speed;
  wordmark.style.animation = `wordmarkIn 0.8s ease-out ${wmDelay}s forwards`;
  tagline.style.animation = `fadeIn 1s ease-out ${tlDelay}s forwards`;
  wordmark.style.opacity = 0;
  tagline.style.opacity = 0;

  // Background gradient for wordmark
  wordmark.style.background = `linear-gradient(135deg, #b0c4de 0%, ${brief.colors.highlight} 35%, ${brief.colors.primary} 65%, ${brief.colors.secondary} 100%)`;
  wordmark.style.webkitBackgroundClip = 'text';
  wordmark.style.webkitTextFillColor = 'transparent';
  wordmark.style.backgroundClip = 'text';

  // Background particles
  renderBgParticles(brief);

  // Sync controls to brief
  syncControlsFromBrief(brief);
}

// ── Controls sync ────────────────────────────────────────────────────

function syncControlsFromBrief(brief) {
  document.getElementById('ctrl-name').value = brief.identity.name;
  document.getElementById('ctrl-tagline').value = brief.identity.tagline;
  document.getElementById('ctrl-primary').value = brief.colors.primary;
  document.getElementById('ctrl-secondary').value = brief.colors.secondary;
  document.getElementById('ctrl-bg').value = brief.colors.background;
  document.getElementById('ctrl-surface').value = brief.colors.surface;
  document.getElementById('ctrl-highlight').value = brief.colors.highlight;
  document.getElementById('ctrl-frame-shape').value = brief.frame.shape;
  document.getElementById('ctrl-border-width').value = brief.frame.border_width;
  document.getElementById('ctrl-connectors').checked = brief.frame.connectors?.enabled ?? true;
  document.getElementById('ctrl-arm-width').value = brief.mark.elements?.[0]?.stroke_width || 2.5;
  document.getElementById('ctrl-node-size').value = brief.mark.nodes?.[0]?.r || 4;
  document.getElementById('ctrl-hub-size').value = brief.mark.hub?.main_radius || 7;
  document.getElementById('ctrl-hub-glow').value = brief.mark.hub?.glow_radius || 28;
  document.getElementById('ctrl-particles').value = brief.animation.idle.bg_particles?.count || 55;
}

function briefFromControls() {
  const b = JSON.parse(JSON.stringify(BRIEF));
  b.identity.name = document.getElementById('ctrl-name').value;
  b.identity.tagline = document.getElementById('ctrl-tagline').value;
  b.colors.primary = document.getElementById('ctrl-primary').value;
  b.colors.secondary = document.getElementById('ctrl-secondary').value;
  b.colors.background = document.getElementById('ctrl-bg').value;
  b.colors.surface = document.getElementById('ctrl-surface').value;
  b.colors.highlight = document.getElementById('ctrl-highlight').value;
  b.frame.shape = document.getElementById('ctrl-frame-shape').value;
  b.frame.border_width = parseFloat(document.getElementById('ctrl-border-width').value);
  b.frame.connectors.enabled = document.getElementById('ctrl-connectors').checked;

  const armW = parseFloat(document.getElementById('ctrl-arm-width').value);
  for (const el of b.mark.elements) el.stroke_width = armW;

  const nodeR = parseFloat(document.getElementById('ctrl-node-size').value);
  for (const node of b.mark.nodes) node.r = nodeR;

  b.mark.hub.main_radius = parseFloat(document.getElementById('ctrl-hub-size').value);
  b.mark.hub.glow_radius = parseFloat(document.getElementById('ctrl-hub-glow').value);
  b._glowStd = parseFloat(document.getElementById('ctrl-glow-std').value);

  b.animation.idle.hub_pulse.enabled = document.getElementById('ctrl-hub-pulse').checked;
  b.animation.idle.data_particles.enabled = document.getElementById('ctrl-data-flow').checked;
  b.animation.idle.node_breathing.enabled = document.getElementById('ctrl-node-breathing').checked;
  b.animation.idle.bg_particles.count = parseInt(document.getElementById('ctrl-particles').value);

  return b;
}

// ── Actions ──────────────────────────────────────────────────────────

function replayAnimation() {
  const b = briefFromControls();
  render(b);
}

function exportBrief() {
  const b = briefFromControls();
  delete b._glowStd;
  const blob = new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${b.identity.name.toLowerCase()}-logo-brief.json`;
  a.click();
}

function copyBrief() {
  const b = briefFromControls();
  delete b._glowStd;
  navigator.clipboard.writeText(JSON.stringify(b, null, 2)).then(() => {
    const btn = document.querySelector('.controls button:last-of-type');
    const orig = btn.textContent;
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── Controls event binding ───────────────────────────────────────────

function bindControls() {
  // Toggle panel
  document.getElementById('toggleBtn').addEventListener('click', () => {
    document.getElementById('controlsPanel').classList.toggle('open');
  });

  // Live-update on control change
  const inputs = document.querySelectorAll('.controls input, .controls select');
  for (const input of inputs) {
    const event = input.type === 'range' || input.type === 'color' ? 'input' : 'change';
    input.addEventListener(event, () => {
      const b = briefFromControls();
      render(b);
    });
  }
}

// ── Init ─────────────────────────────────────────────────────────────

// Load brief from: 1) ?brief=url parameter, 2) inline LOGO_BRIEF, 3) default
async function init() {
  let brief;

  // Check URL parameter
  const params = new URLSearchParams(window.location.search);
  const briefUrl = params.get('brief');
  if (briefUrl) {
    try {
      const resp = await fetch(briefUrl);
      brief = await resp.json();
    } catch (e) {
      console.warn('Failed to load brief from URL, using inline/default');
    }
  }

  // Check inline brief (injected by generator script)
  if (!brief && typeof LOGO_BRIEF !== 'undefined') {
    brief = LOGO_BRIEF;
  }

  // Fallback to embedded default
  if (!brief) {
    brief = DEFAULT_BRIEF;
  }

  bindControls();
  render(brief);
}
