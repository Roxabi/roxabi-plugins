name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - run: bun install
      - name: Lint
        run: bun lint
      - name: Typecheck
        run: bun typecheck
      - name: Test (vitest)
        run: bun run test
      - name: Test (cli — bun:test)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd plugins/dev-core/cli && bun test
      - name: Shared detectGitHubRepo suite — caller parity (#218 SC3)
        run: |
          set -euo pipefail
          DEV_CORE="plugins/dev-core/skills/shared/__tests__/config.test.ts"
          DEV_INIT="plugins/dev-init/skills/shared/__tests__/config.test.ts"
          if ! diff "$DEV_CORE" "$DEV_INIT"; then
            echo "ERROR: dev-core and dev-init config.test.ts have diverged."
            echo "  The registerGitHubRepoDetectionSuite caller boilerplate must stay byte-identical."
            echo "  See #218 spec SC3 / #225 — update both files in lockstep."
            exit 1
          fi
          echo "Caller parity OK — both config.test.ts are byte-identical"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - run: pip install pytest==8.3.5 pyyaml git+https://github.com/Roxabi/roxabi-vault.git@df12ba1c447ca6f01434db017c57f7645662813c  # main
      - name: Test (pytest)
        run: python3 -m pytest tests/ -v
      - name: Validate plugins
        run: python3 tools/validate_plugins.py
      - name: Validate registry sync
        run: |
          set -euo pipefail
          REGISTRY=".claude-plugin/external-registry.json"
          CURATED_FILE=".claude-plugin/curated-marketplaces.json"

          if [ ! -f "$REGISTRY" ] || [ ! -f "$CURATED_FILE" ]; then
            echo "Registry files not found — skipping sync check"
            exit 0
          fi

          REG_NAMES=$(jq -r '.curated_marketplaces[].name' "$REGISTRY" 2>/dev/null | sort || echo "")
          FILE_NAMES=$(jq -r '.marketplaces[].name' "$CURATED_FILE" 2>/dev/null | sort || echo "")

          if [ "$REG_NAMES" != "$FILE_NAMES" ]; then
            echo "ERROR: curated_marketplaces in external-registry.json and curated-marketplaces.json are out of sync"
            echo "  external-registry.json names: $(echo "$REG_NAMES" | tr '\n' ',' | sed 's/,$//')"
            echo "  curated-marketplaces.json names: $(echo "$FILE_NAMES" | tr '\n' ',' | sed 's/,$//')"
            echo "  Update curated-marketplaces.json to mirror external-registry.json curated_marketplaces[]"
            exit 1
          fi

          echo "Registry sync OK — both files agree on curated marketplace names"
