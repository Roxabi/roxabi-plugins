name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461  # v2
      - run: bun install
      - name: Lint
        run: bun lint
      - name: Typecheck
        run: bun typecheck
      - name: Test (vitest)
        run: bun run test
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pytest git+https://github.com/Roxabi/roxabi-memory.git@main
      - name: Test (pytest)
        run: python3 -m pytest tests/ -v
