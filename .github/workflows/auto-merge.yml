# Auto-merge PRs that have been reviewed and passed all required checks.
# Adds the PR to GitHub's merge queue (squash) once the "reviewed" label is present.
# GitHub natively waits for all required status checks before merging.
#
# Linked issues are closed by GitHub's native "Closes #X" auto-close behaviour.
name: Auto Merge

on:
  pull_request:
    types: [labeled, synchronize]
  push:
    branches: [staging, main]

jobs:
  auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'reviewed')
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge "$PR_NUMBER" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  update-behind-prs:
    name: Update behind PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event_name == 'push'
    timeout-minutes: 5
    steps:
      - name: Update all reviewed PRs targeting this branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          PRS=$(gh pr list --repo "$REPO" --base "$BRANCH" --label reviewed --state open --json number,headRefOid --jq '.[] | [.number,.headRefOid] | @tsv')
          if [ -z "$PRS" ]; then
            echo "No reviewed PRs targeting $BRANCH"
            exit 0
          fi
          echo "$PRS" | while IFS=$'\t' read -r NUM SHA; do
            echo "Updating PR #$NUM..."
            gh api "repos/$REPO/pulls/$NUM/update-branch" \
              --method PUT -f expected_head_sha="$SHA" || true
          done
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
