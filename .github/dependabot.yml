version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
        # Majors excluded from the group → emitted as individual PRs so the
        # auto-merge semver-major guard reviews each one on its own.
        update-types:
          - minor
          - patch
    # github-actions supports ONLY `default-days` — `semver-*-days` are rejected
    # for this ecosystem and made the whole config fail validation. Undefined
    # semver-*-days fall back to default-days, so 3 days applies to every bump.
    cooldown:
      default-days: 3
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns:
          - "*"
        # Majors excluded from the group → emitted as individual PRs so the
        # auto-merge semver-major guard reviews each one on its own.
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
