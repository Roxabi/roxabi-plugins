version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
        # Majors excluded from the group → emitted as individual PRs so the
        # auto-merge semver-major guard reviews each one on its own.
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns:
          - "*"
        # Majors excluded from the group → emitted as individual PRs so the
        # auto-merge semver-major guard reviews each one on its own.
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
